function LucideIcon({ name, className = "" }) {
  useEffect(() => {

  });
  return <i data-lucide={name} className={className}></i>;
}

function ImgBox({ src, alt, className = "", fit = "cover" }) {
  const [ok, setOk] = useState(true);
  const baseClass = fit === "contain"
    ? "max-w-full object-contain rounded-2xl "
    : "w-full object-cover rounded-2xl ";
  return ok ? (
    <img
      src={src}
      alt={alt}
      className={baseClass + className}
      onError={() => setOk(false)}
      loading="lazy"
      decoding="async"
    />
  ) : (
    <div
      className={
        "rounded-2xl bg-slate-100 border-2 border-dashed border-slate-300 flex items-center justify-center " +
        className
      }
    >
      <div className="text-slate-400 font-bold text-sm text-center px-4">
        Image loading<br/><span className="text-xs font-normal">{src}</span>
      </div>
    </div>
  );
}

        </div>

              {

                doiLabel: "https://doi.org/10.3322/caac.21864",

              {

              {

  ];

  return (
    <div className="w-full min-h-screen bg-slate-200 safePad">
      {slides.map((slide, i) => (
        <SlideFrame key={i} index={i}>

};
