<script>
// ─── 결제/청구 화면 ────────────────────────────────────────────
function getBillingHTML(params) {
  showLoading(true);
  callServer('billing.list', { onlyOutstanding: false }).then(data => {
    const billing = data.billing || [];
    const today = new Date();
    const outstanding = billing.filter(b =>
      ['Invoice Sent','Partially Paid'].includes(b.payment_status)
    );
    const overdue = outstanding.filter(b => b.due_date && new Date(b.due_date) < today);
    const totalOut = outstanding.reduce((s,b) =>
      s + (Number(b.invoice_amount||0) - Number(b.paid_amount||0)), 0);

    const html = `
      <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
        <div class="stat-card primary"><div class="stat-number">${billing.length}</div><div class="stat-label">전체 청구</div></div>
        <div class="stat-card danger"><div class="stat-number">${fmtMoney(totalOut)}</div><div class="stat-label">총 미수금</div></div>
        <div class="stat-card warning"><div class="stat-number">${overdue.length}</div><div class="stat-label">결제 기한 초과</div></div>
        <div class="stat-card success"><div class="stat-number">${billing.filter(b=>b.payment_status==='Paid').length}</div><div class="stat-label">완납</div></div>
      </div>

      <!-- 기한 초과 경고 -->
      ${overdue.length > 0 ? `
      <div class="card">
        <div class="card-header"><span class="card-title" style="color:var(--danger)">🔴 결제 기한 초과 (${overdue.length}건)</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th class="mobile-hide">Billing ID</th><th>케이스</th><th class="mobile-hide">청구액</th><th>미수금</th><th>만료일</th><th>상태</th><th></th></tr></thead>
            <tbody>
              ${overdue.map(b => `
                <tr style="background:#fff0f0">
                  <td class="mobile-hide"><code>${b.billing_id}</code></td>
                  <td><a href="#" onclick="loadPage('caseDetail',{caseId:'${b.case_id}'})"><strong>${b.patient_name||b.case_id}</strong><br><span style="font-size:11px;color:var(--gray-500)">${b.case_id}</span></a></td>
                  <td class="mobile-hide">${fmtMoney(b.invoice_amount)}</td>
                  <td style="color:var(--danger);font-weight:700">${fmtMoney(Number(b.invoice_amount||0)-Number(b.paid_amount||0))}</td>
                  <td style="color:var(--danger)">${fmtDate(b.due_date)}</td>
                  <td>${statusBadge(b.payment_status)}</td>
                  <td><button class="btn btn-sm btn-success" onclick="showPaymentModal('${b.billing_id}')">입금 처리</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
      ` : ''}

      <!-- 전체 목록 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">전체 청구 목록</span>
          <button class="btn btn-primary btn-sm" onclick="showBillingCreateModal()">+ 청구 생성</button>
        </div>
        <div class="filter-bar">
          <input type="text" id="billSearch" placeholder="케이스 ID / Billing ID" oninput="filterBilling()">
          <select id="billStatusFilter" onchange="filterBilling()">
            <option value="">전체 상태</option>
            <option value="Not Issued">미발행</option>
            <option value="Quote Sent">견적 발송</option>
            <option value="Invoice Sent">청구서 발송</option>
            <option value="Partially Paid">일부 납부</option>
            <option value="Paid">납부 완료</option>
            <option value="Refunded">환불</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="mobile-hide">Billing ID</th><th>케이스</th>
                <th class="mobile-hide">통화</th><th class="mobile-hide">견적액</th>
                <th class="mobile-hide">청구액</th><th class="mobile-hide">납입액</th>
                <th>미수금</th><th>만료일</th><th>상태</th><th>액션</th>
              </tr>
            </thead>
            <tbody>
              ${billing.length === 0 ? `<tr><td colspan="10"><div class="empty-state"><div class="empty-state-icon">💳</div><h3>청구 내역 없음</h3></div></td></tr>` :
              billing.map(b => {
                const outstanding_ = Number(b.invoice_amount||0) - Number(b.paid_amount||0);
                const isOverdue = b.due_date && new Date(b.due_date) < today &&
                  ['Invoice Sent','Partially Paid'].includes(b.payment_status);
                return `
                  <tr class="bill-row" data-id="${b.billing_id}" data-caseid="${b.case_id}" data-name="${b.patient_name||''}" data-status="${b.payment_status}"
                    style="${isOverdue ? 'background:#fff8f0' : ''}">
                    <td class="mobile-hide"><code>${b.billing_id}</code></td>
                    <td><a href="#" onclick="loadPage('caseDetail',{caseId:'${b.case_id}'})"><strong>${b.patient_name||b.case_id}</strong><br><span style="font-size:11px;color:var(--gray-500)">${b.case_id}</span></a></td>
                    <td class="mobile-hide">${b.currency||'KRW'}</td>
                    <td class="mobile-hide">${fmtMoney(b.quote_amount)}</td>
                    <td class="mobile-hide">${fmtMoney(b.invoice_amount)}</td>
                    <td class="mobile-hide">${fmtMoney(b.paid_amount)}</td>
                    <td style="${outstanding_>0?'color:var(--danger);font-weight:700':''}">${outstanding_>0?fmtMoney(outstanding_):'-'}</td>
                    <td style="${isOverdue?'color:var(--danger)':''}">${fmtDate(b.due_date)}</td>
                    <td>${statusBadge(b.payment_status)}</td>
                    <td>
                      ${b.payment_status==='Not Issued' ? `<button class="btn btn-sm btn-primary" onclick="showQuoteModal('${b.billing_id}')">견적</button>` : ''}
                      ${b.payment_status==='Quote Sent' ? `<button class="btn btn-sm btn-primary" onclick="showInvoiceModal('${b.billing_id}')">인보이스</button>` : ''}
                      ${['Invoice Sent','Partially Paid'].includes(b.payment_status) ? `<button class="btn btn-sm btn-success" onclick="showPaymentModal('${b.billing_id}')">입금</button>` : ''}
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

function filterBilling() {
  const search = document.getElementById('billSearch').value.toLowerCase();
  const status = document.getElementById('billStatusFilter').value;
  document.querySelectorAll('.bill-row').forEach(row => {
    const id = (row.dataset.id + ' ' + row.dataset.caseid + ' ' + (row.dataset.name||'')).toLowerCase();
    const ok = (!search || id.includes(search)) && (!status || row.dataset.status === status);
    row.style.display = ok ? '' : 'none';
  });
}

// ─── 청구 생성 모달 ───────────────────────────────────────────
function showBillingCreateModal(caseId) {
  const body = `
    <div class="form-grid">
      <div class="form-group full">
        <label class="required">케이스 ID</label>
        <input type="text" id="billCaseId" value="${caseId||''}" required placeholder="CASE-2026-001">
      </div>
      <div class="form-group">
        <label>통화</label>
        <select id="billCurrency">
          <option value="KRW">KRW (원)</option>
          <option value="USD">USD</option>
          <option value="JPY">JPY</option>
          <option value="CNY">CNY</option>
        </select>
      </div>
      <div class="form-group">
        <label>견적액</label>
        <input type="number" id="billQuoteAmt" placeholder="0">
      </div>
      <div class="form-group">
        <label>청구액</label>
        <input type="number" id="billInvAmt" placeholder="0">
      </div>
      <div class="form-group">
        <label>결제 마감일</label>
        <input type="date" id="billDueDate">
      </div>
      <div class="form-group full">
        <label>메모</label>
        <textarea id="billNotes" placeholder="패키지 구성 등"></textarea>
      </div>
    </div>
  `;
  showModal('청구 생성', body, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitBillingCreate()">생성</button>
  `);
}

function submitBillingCreate() {
  const caseId = document.getElementById('billCaseId').value;
  if (!caseId) { showAlert('케이스 ID 필수', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('billing.save', {
    case_id: caseId,
    currency: document.getElementById('billCurrency').value,
    quote_amount: document.getElementById('billQuoteAmt').value,
    invoice_amount: document.getElementById('billInvAmt').value,
    due_date: document.getElementById('billDueDate').value,
    notes: document.getElementById('billNotes').value,
  }).then(() => { closeModal(); showAlert('청구 생성 완료', 'success'); loadPage('billing'); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 견적 발행 ─────────────────────────────────────────────
function showQuoteModal(billingId) {
  const body = `
    <div class="form-grid">
      <div class="form-group"><label class="required">견적 번호</label><input type="text" id="quoteNo" required placeholder="Q-2026-001"></div>
      <div class="form-group"><label class="required">견적액</label><input type="number" id="quoteAmt" required></div>
      <div class="form-group"><label>결제 마감일</label><input type="date" id="quoteDue"></div>
    </div>
  `;
  showModal('견적 발행', body, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitQuote('${billingId}')">견적 발행</button>
  `);
}
function submitQuote(billingId) {
  const quoteNo = document.getElementById('quoteNo').value;
  const amt = document.getElementById('quoteAmt').value;
  if (!quoteNo || !amt) { showAlert('필수 항목 입력', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('billing.issueQuote', { billingId, quoteNo, quoteAmount: amt, dueDate: document.getElementById('quoteDue').value })
    .then(() => { closeModal(); showAlert('견적 발행 완료', 'success'); loadPage('billing'); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 인보이스 발행 ────────────────────────────────────────
function showInvoiceModal(billingId) {
  const body = `
    <div class="form-grid">
      <div class="form-group"><label class="required">인보이스 번호</label><input type="text" id="invNo" required placeholder="INV-2026-001"></div>
      <div class="form-group"><label class="required">청구액</label><input type="number" id="invAmt" required></div>
      <div class="form-group"><label class="required">결제 마감일</label><input type="date" id="invDue" required></div>
    </div>
  `;
  showModal('인보이스 발행', body, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitInvoice('${billingId}')">인보이스 발행</button>
  `);
}
function submitInvoice(billingId) {
  const no = document.getElementById('invNo').value;
  const amt = document.getElementById('invAmt').value;
  const due = document.getElementById('invDue').value;
  if (!no || !amt || !due) { showAlert('필수 항목 입력', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('billing.issueInvoice', { billingId, invoiceNo: no, invoiceAmount: amt, dueDate: due })
    .then(() => { closeModal(); showAlert('인보이스 발행 완료', 'success'); loadPage('billing'); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 입금 처리 ─────────────────────────────────────────────
function showPaymentModal(billingId) {
  const body = `
    <div class="form-grid">
      <div class="form-group full"><label class="required">입금액</label><input type="number" id="payAmt" required placeholder="0"></div>
      <div class="form-group"><label>입금일</label><input type="date" id="payDate" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
  `;
  showModal('입금 처리', body, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-success" onclick="submitPayment('${billingId}')">입금 처리</button>
  `);
}
function submitPayment(billingId) {
  const amt = document.getElementById('payAmt').value;
  if (!amt) { showAlert('입금액 필수', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-success');
  setLoadingBtn(btn, true);
  callServer('billing.recordPayment', { billingId, paidAmount: Number(amt), paidDate: document.getElementById('payDate').value })
    .then(() => { closeModal(); showAlert('입금 처리 완료', 'success'); loadPage('billing'); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}
</script>
