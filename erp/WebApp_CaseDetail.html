<script>
// ─── 케이스 상세 ───────────────────────────────────────────────
function getCaseDetailHTML(params) {
  if (!params || !params.caseId) { showContent('<div class="alert alert-error">케이스 ID가 없습니다</div>'); return; }
  showLoading(true);
  callServer('case.get', { caseId: params.caseId }).then(data => {
    const c = data.case;
    const patient = data.patient;
    const patientName  = patient ? (patient.full_name || patient.patient_code || '') : '';
    const coordDisplay = c.coordinator_name || c.assigned_coordinator || '-';
    const hospDisplay  = c.hospital_name   || c.hospital_id          || '-';
    const html = `
      <!-- 헤더 -->
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="loadPage('cases')">← 목록</button>
        <div>
          <div style="font-size:18px;font-weight:700">
            ${c.case_id}${patientName ? ` <span style="color:var(--gray-500);font-weight:500">| ${patientName}</span>` : ''}
          </div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:3px">
            🏥 ${hospDisplay} &nbsp;·&nbsp; 👤 ${coordDisplay}
          </div>
        </div>
        ${statusBadge(c.case_status)}
        ${c.priority ? `<span class="badge badge-${c.priority==='Urgent'?'red':c.priority==='High'?'orange':'gray'}">${c.priority}</span>` : ''}
        <div style="margin-left:auto" class="btn-group">
          ${renderCaseActionButtons_(c)}
        </div>
      </div>
      ${renderPhaseIndicator_(c)}

      <!-- 탭 -->
      <div class="tabs">
        <div class="tab active" onclick="switchTab(event,'tab-summary')">요약</div>
        <div class="tab" onclick="switchTab(event,'tab-review')">병원 검토</div>
        <div class="tab" onclick="switchTab(event,'tab-orders')">주문/배송</div>
        <div class="tab" onclick="switchTab(event,'tab-procedure')">시술기록</div>
        <div class="tab" onclick="switchTab(event,'tab-docs')">문서</div>
        <div class="tab" onclick="switchTab(event,'tab-billing')">결제/청구</div>
        <div class="tab" onclick="switchTab(event,'tab-followup')">추적관리</div>
        <div class="tab" onclick="switchTab(event,'tab-log')">활동 로그</div>
      </div>

      <!-- 요약 탭 -->
      <div class="tab-content active" id="tab-summary">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">
          <div class="card">
            <div class="card-header"><span class="card-title">케이스 정보</span></div>
            <div class="card-body">
              <div class="detail-grid">
                <div class="detail-item"><label>케이스 ID</label><div class="value"><code>${c.case_id}</code></div></div>
                <div class="detail-item"><label>상태</label><div class="value">${statusBadge(c.case_status)}</div></div>
                <div class="detail-item"><label>병원</label><div class="value">${c.hospital_id || '-'}</div></div>
                <div class="detail-item"><label>공급업체</label><div class="value">${c.supplier_id || '-'}</div></div>
                <div class="detail-item"><label>적응증</label><div class="value">${c.target_indication || '-'}</div></div>
                <div class="detail-item"><label>담당 코디</label><div class="value">${c.assigned_coordinator || '-'}</div></div>
                <div class="detail-item"><label>시술일</label><div class="value">${c.treatment_date ? fmtDate(c.treatment_date) : '-'}</div></div>
                <div class="detail-item"><label>등록일</label><div class="value">${fmtDate(c.case_opened_at)}</div></div>
                ${c.drive_folder_url ? `<div class="detail-item full"><label>Drive 폴더</label><div class="value"><a href="${c.drive_folder_url}" target="_blank">📁 열기</a></div></div>` : ''}
              </div>
              ${c.remarks ? `<p style="margin-top:12px;color:var(--gray-700);font-size:13px">${c.remarks}</p>` : ''}
            </div>
          </div>

          ${patient ? `
          <div class="card">
            <div class="card-header"><span class="card-title">환자 정보</span></div>
            <div class="card-body">
              <div class="detail-grid">
                <div class="detail-item"><label>환자 코드</label><div class="value"><code>${patient.patient_code || '-'}</code></div></div>
                ${patient.date_of_birth ? `<div class="detail-item"><label>생년월일</label><div class="value">${fmtDate(patient.date_of_birth)}</div></div>` : ''}
                ${patient.sex ? `<div class="detail-item"><label>성별</label><div class="value">${patient.sex}</div></div>` : ''}
                ${patient.nationality ? `<div class="detail-item"><label>국적</label><div class="value">${patient.nationality}</div></div>` : ''}
                ${patient.preferred_language ? `<div class="detail-item"><label>선호 언어</label><div class="value">${patient.preferred_language}</div></div>` : ''}
                ${patient.email && APP.role !== 'Hospital User' ? `<div class="detail-item"><label>이메일</label><div class="value">${patient.email}</div></div>` : ''}
              </div>
            </div>
          </div>
          ` : ''}
        </div>

        <!-- 일정 요약 -->
        ${data.appointments && data.appointments.length > 0 ? `
        <div class="card">
          <div class="card-header">
            <span class="card-title">📅 일정</span>
            <button class="btn btn-sm btn-secondary" onclick="showAddAppointmentModal('${c.case_id}')">+ 일정 추가</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>유형</th><th>날짜</th><th>장소</th><th>담당</th><th>상태</th></tr></thead>
              <tbody>
                ${data.appointments.map(a => `
                  <tr>
                    <td>${a.appointment_type}</td>
                    <td>${fmtDate(a.scheduled_date)}</td>
                    <td>${a.location || '-'}</td>
                    <td>${a.responsible_party || '-'}</td>
                    <td>${statusBadge(a.attendee_status)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        ` : ''}
      </div>

      <!-- 병원 검토 탭 -->
      <div class="tab-content" id="tab-review">
        ${renderReviewTab_(data.reviews, c, data)}
      </div>

      <!-- 주문/배송 탭 -->
      <div class="tab-content" id="tab-orders">
        ${renderOrderTab_(data.orders, c)}
      </div>

      <!-- 시술기록 탭 -->
      <div class="tab-content" id="tab-procedure">
        ${renderProcedureTab_(data.procedures, c)}
      </div>

      <!-- 문서 탭 -->
      <div class="tab-content" id="tab-docs">
        ${renderDocsTab_(data.docs, c)}
      </div>

      <!-- 결제 탭 -->
      <div class="tab-content" id="tab-billing">
        ${renderBillingTab_(data.billing, c)}
      </div>

      <!-- 추적관찰 탭 -->
      <div class="tab-content" id="tab-followup">
        ${renderFollowupTab_(data.followups, c)}
      </div>

      <!-- 활동 로그 탭 -->
      <div class="tab-content" id="tab-log">
        <div class="card">
          <div class="card-header"><span class="card-title">활동 로그</span></div>
          <div class="card-body">
            <div class="timeline">
              ${(data.activities || []).map(a => `
                <div class="timeline-item">
                  <div class="timeline-dot"></div>
                  <div class="timeline-date">${fmtDate(a.activity_date)} · ${a.actor_role} · ${a.actor_email}</div>
                  <div class="timeline-content"><strong>${a.action_type}</strong> — ${a.summary}</div>
                  ${a.next_action ? `<div class="timeline-content" style="color:var(--primary)">다음: ${a.next_action}</div>` : ''}
                </div>
              `).join('') || '<p>기록 없음</p>'}
            </div>
          </div>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

// ─── 탭 전환 ──────────────────────────────────────────────────
function switchTab(event, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// ─── Phase 표시 ──────────────────────────────────────────────
function renderPhaseIndicator_(c) {
  const PHASE = {
    'Draft':                    { label: '초안',          next: '병원 검토를 요청하세요',             condition: '병원검토 탭 → [+ 검토 요청] 클릭',                   owner: 'MSO 담당자' },
    'Hospital Approved':        { label: '병원 승인',     next: '공급 주문을 등록하세요',              condition: '[공급 요청] 클릭 → 공급업체·제품·배송 예정일 입력',  owner: 'MSO 담당자' },
    'Supplier Coordination':    { label: '공급 조율',     next: '출고 확정 정보를 입력하세요',         condition: '주문/배송 탭 → [출고 확정] 클릭 → 확정 출고일·LOT 번호 입력', owner: 'MSO/공급업체' },
    'Shipment In Transit':      { label: '배송 중',       next: '수령 후 입고 검수를 진행하세요',      condition: '주문/배송 탭 → [검수] 클릭 → Accepted/Rejected 선택',owner: '병원 담당자' },
    'Acceptance Check Pending': { label: '입고 검수 대기',next: '입고 검수 결과를 입력하세요',         condition: '주문/배송 탭 → [검수] 클릭 → 검수 결과 저장',        owner: '병원 담당자' },
    'Acceptance Confirmed':     { label: '입고 확인',     next: '시술 일정을 확정하세요',              condition: '시술기록 탭 → [시술 일정 확정] → 날짜·의사 입력',    owner: 'MSO/병원' },
    'Scheduled':                { label: '시술 예정',     next: '시술 완료 후 완료 처리하세요',        condition: '상단 [시술 완료 처리] 버튼 클릭',                    owner: '병원 담당자' },
    'Completed':                { label: '시술 완료',     next: '추적관찰을 시작하세요',               condition: '추적관리 탭 → D7 완료 처리부터 시작',               owner: 'MSO 담당자' },
    'Follow-up Ongoing':        { label: '추적관찰 중',   next: '단계별 추적관찰을 완료하세요',        condition: 'D7 → D14 → D30 → D90 → D180 순서로 완료 처리',      owner: 'MSO 담당자' },
    'Closed':                   { label: '케이스 종료',   next: '완료된 케이스입니다',                 condition: '-',                                                owner: '-' },
    'Cancelled':                { label: '취소됨',        next: '취소된 케이스입니다',                 condition: '-',                                                owner: '-' },
  };
  const p = PHASE[c.case_status];
  if (!p) return '';
  const isTerminal = ['Closed','Cancelled'].includes(c.case_status);
  return `
    <div style="background:${isTerminal?'var(--gray-100)':'#e8f4fd'};
      border-left:4px solid ${isTerminal?'var(--gray-400)':'#1a73e8'};
      border-radius:6px;padding:10px 14px;margin-bottom:12px;
      display:flex;gap:20px;flex-wrap:wrap;font-size:13px">
      <div><span style="color:var(--gray-500)">현재 단계</span>&nbsp;<strong>${p.label}</strong></div>
      ${!isTerminal ? `
      <div><span style="color:var(--gray-500)">다음 할 일</span>&nbsp;<strong style="color:#1a73e8">${p.next}</strong></div>
      <div style="color:var(--gray-600)"><span style="color:var(--gray-500)">조건</span>&nbsp;${p.condition}</div>
      <div style="color:var(--gray-600)"><span style="color:var(--gray-500)">담당</span>&nbsp;${p.owner}</div>
      ` : ''}
    </div>
  `;
}

// ─── 공급 요청 모달 ──────────────────────────────────────────
function showSupplierOrderModal(caseId) {
  callServer('supplier.list', {}).then(sData => {
    const suppliers  = sData.suppliers || [];
    const suppOptions = suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    const body = `
      <div class="form-grid">
        <div class="form-group full">
          <label class="required">공급업체</label>
          <select id="soSupplier" required>
            <option value="">선택</option>${suppOptions}
          </select>
        </div>
        <div class="form-group">
          <label>주문일</label>
          <input type="date" id="soOrderDate">
        </div>
        <div class="form-group">
          <label class="required">제품/세포 유형</label>
          <input type="text" id="soItem" required placeholder="예: 자가 줄기세포 (PRP)">
        </div>
        <div class="form-group">
          <label>수량</label>
          <input type="number" id="soQty" value="1" min="1">
        </div>
        <div class="form-group">
          <label>배송 예정일</label>
          <input type="date" id="soExpShip">
        </div>
        <div class="form-group">
          <label>실제 수령일</label>
          <input type="date" id="soDelivery">
        </div>
        <div class="form-group">
          <label>픽업 담당자</label>
          <input type="text" id="soPickup" placeholder="이름 / 연락처">
        </div>
        <div class="form-group">
          <label>인수 담당자 (병원)</label>
          <input type="text" id="soAcceptance" placeholder="병원 수령 담당자">
        </div>
        <div class="form-group">
          <label>보관 조건</label>
          <input type="text" id="soStorage" placeholder="예: 2~8°C 냉장">
        </div>
        <div class="form-group full">
          <label>유의사항</label>
          <input type="text" id="soCautions" placeholder="예: 충격 주의, 직사광선 차단">
        </div>
        <div class="form-group full" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="soAddReview" style="width:auto;margin:0">
          <label style="margin:0;font-weight:normal">추가 병원 검토 필요</label>
        </div>
        <div class="form-group full">
          <label>MSO 협의 메모</label>
          <textarea id="soMsoNotes" placeholder="공급업체와 협의한 내용, 특이사항 등"></textarea>
        </div>
      </div>
    `;
    const footer = `
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="submitSupplierOrder('${caseId}')">공급 요청 등록</button>
    `;
    showModal('공급 요청 등록', body, footer);
  }).catch(err => showAlert('공급업체 목록 로드 실패: ' + err.message, 'error'));
}

function submitSupplierOrder(caseId) {
  const supplierId = document.getElementById('soSupplier').value;
  const item       = document.getElementById('soItem').value.trim();
  if (!supplierId) { showAlert('공급업체를 선택하세요', 'warning'); return; }
  if (!item)       { showAlert('제품/세포 유형을 입력하세요', 'warning'); return; }
  callServer('supplier.order.create', {
    caseId, supplierId,
    requestedItem:            item,
    quantity:                 Number(document.getElementById('soQty').value) || 1,
    expectedShipDate:         document.getElementById('soExpShip').value,
    pickupPerson:             document.getElementById('soPickup').value,
    acceptancePerson:         document.getElementById('soAcceptance').value,
    storageCondition:         document.getElementById('soStorage').value,
    cautions:                 document.getElementById('soCautions').value,
    requiresAdditionalReview: document.getElementById('soAddReview').checked,
    msoNotes:                 document.getElementById('soMsoNotes').value,
  }).then(result => {
    closeModal();
    showAlert(`공급 요청 등록 완료: ${result.orderId}`, 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => showAlert(err.message, 'error'));
}

// ─── 케이스 액션 버튼 ─────────────────────────────────────────
function renderCaseActionButtons_(c) {
  const role = APP.role;
  const s = c.case_status;
  const isDeleted = c.is_deleted === true || String(c.is_deleted).toLowerCase() === 'true';
  const btns = [];

  if (['Hospital Approved','Supplier Coordination'].includes(s) && ['MSO Admin','MSO Coordinator'].includes(role)) {
    btns.push(`<button class="btn btn-primary btn-sm" onclick="showSupplierOrderModal('${c.case_id}')">공급 요청</button>`);
  }
  if (s === 'Scheduled' && ['MSO Admin','Hospital User'].includes(role)) {
    btns.push(`<button class="btn btn-success btn-sm" onclick="markTreatmentComplete('${c.case_id}')">시술 완료 처리</button>`);
  }
  if (['MSO Admin','MSO Coordinator'].includes(role) && !isDeleted) {
    btns.push(`<button class="btn btn-danger btn-sm" onclick="showCaseDeleteModal('${c.case_id}')">삭제</button>`);
  }

  return btns.join('');
}

function showCaseDeleteModal(caseId) {
  showModal('케이스 삭제', `
    <p style="margin-bottom:12px"><strong>${caseId}</strong> 케이스를 삭제하시겠습니까?</p>
    <div class="form-group">
      <label>삭제 사유</label>
      <input type="text" id="caseDetailDeleteReason" placeholder="예: 환자 취소, 중복 생성">
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-danger" onclick="confirmCaseDelete('${caseId}')">삭제</button>
  `);
}

function confirmCaseDelete(caseId) {
  const reason = document.getElementById('caseDetailDeleteReason').value;
  callServer('case.delete', { caseId, reason })
    .then(() => { closeModal(); showAlert('케이스가 삭제되었습니다', 'success'); loadPage('cases'); })
    .catch(err => showAlert(err.message, 'error'));
}

// ─── 병원 검토 탭 렌더링 ─────────────────────────────────────
function renderReviewTab_(reviews, c, data) {
  const role = APP.role;
  const hasPending = reviews && reviews.some(r => r.review_status === 'Pending');
  const canRequest = ['MSO Admin','MSO Coordinator'].includes(role) &&
    ['Draft','Supplier Coordination'].includes(c.case_status) && !hasPending;
  const canSubmit = ['MSO Admin','Hospital User'].includes(role);

  const headerBtn = canRequest
    ? `<button class="btn btn-primary btn-sm" onclick="requestHospitalReview('${c.case_id}')">+ 검토 요청</button>`
    : '';

  if (!reviews || reviews.length === 0) return `
    <div class="card">
      <div class="card-header"><span class="card-title">병원 검토 이력</span>${headerBtn}</div>
      <div class="empty-state"><div class="empty-state-icon">🔬</div><h3>검토 요청 내역 없음</h3></div>
    </div>
  `;

  const cards = reviews.map((r, idx) => {
    const isPending = r.review_status === 'Pending';
    const submitBtn = canSubmit && isPending
      ? `<button class="btn btn-primary btn-sm" onclick="showReviewSubmitModal('${r.review_id}','${r.case_id}')">결과 입력</button>`
      : '';
    const linkedBadge = r.linked_order_id
      ? `<span class="badge badge-orange" style="font-size:11px">추가검토: ${r.linked_order_id}</span>`
      : `<span class="badge badge-gray" style="font-size:11px">최초검토</span>`;
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-header">
          <span class="card-title">검토 #${reviews.length - idx} ${linkedBadge}</span>
          ${submitBtn}
        </div>
        <div class="card-body">
          <div class="detail-grid">
            <div class="detail-item"><label>요청일</label><div class="value">${fmtDate(r.review_request_date)}</div></div>
            <div class="detail-item"><label>완료일</label><div class="value">${r.review_completed_date ? fmtDate(r.review_completed_date) : '-'}</div></div>
            <div class="detail-item"><label>진행 상태</label><div class="value">${statusBadge(r.review_status)}</div></div>
            <div class="detail-item"><label>검토 결과</label><div class="value">${r.review_result ? statusBadge(r.review_result) : '-'}</div></div>
            ${r.hospital_user ? `<div class="detail-item"><label>담당 의사</label><div class="value">${r.hospital_user}</div></div>` : ''}
            ${r.next_medical_step ? `<div class="detail-item"><label>다음 단계</label><div class="value">${r.next_medical_step}</div></div>` : ''}
            ${r.consultation_date ? `<div class="detail-item"><label>상담일</label><div class="value">${fmtDate(r.consultation_date)}</div></div>` : ''}
            ${r.additional_test_required ? `<div class="detail-item"><label>추가 검사</label><div class="value">${r.additional_test_required}</div></div>` : ''}
            ${r.medical_notes_link ? `<div class="detail-item full"><label>의료 기록</label><div class="value"><a href="${r.medical_notes_link}" target="_blank">🔗 열기</a></div></div>` : ''}
          </div>
          ${r.notes ? `<p style="margin-top:10px;color:var(--gray-700);font-size:13px">${r.notes}</p>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="card">
      <div class="card-header"><span class="card-title">병원 검토 이력</span>${headerBtn}</div>
    </div>
    ${cards}
  `;
}

    closeModal(); showAlert('시술 기록 저장 완료', 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => showAlert(err.message, 'error'));
}

// ─── 케이스 액션 함수들 ───────────────────────────────────────
function requestHospitalReview(caseId) {
  if (!confirm(`${caseId}에 대해 병원 검토를 요청하시겠습니까?`)) return;
  callServer('review.request', { caseId })
    .then(() => { showAlert('병원 검토 요청 완료', 'success'); loadPage('caseDetail', { caseId }); })
    .catch(err => showAlert(err.message, 'error'));
}

function requestAdditionalReview(caseId, orderId) {
  if (!confirm(`주문 ${orderId}에 대한 추가 병원 검토를 요청하시겠습니까?`)) return;
  callServer('review.request', { caseId, linkedOrderId: orderId })
    .then(() => { showAlert('추가 병원 검토 요청 완료', 'success'); loadPage('caseDetail', { caseId }); })
    .catch(err => showAlert(err.message, 'error'));
}

function markTreatmentComplete(caseId) {
  if (!confirm('시술 완료 처리하시겠습니까? 추적관찰 일정이 자동 생성됩니다.')) return;
  callServer('case.changeStatus', { caseId, targetStatus: 'Completed' })
    .then(() => { showAlert('시술 완료 처리됨', 'success'); loadPage('caseDetail', { caseId }); })
    .catch(err => showAlert(err.message, 'error'));
}

function showAddAppointmentModal(caseId) {
  const body = `
    <div class="form-grid">
      <div class="form-group full">
        <label class="required">유형</label>
        <select id="aptType" required>
          <option value="">선택</option>
          <option>First Consultation</option><option>Hospital Consultation</option>
          <option>Additional Test</option><option>Treatment Day</option>
          <option>Acceptance Check</option><option>Follow-up Call</option>
          <option>Follow-up Visit</option><option>Billing Review</option>
        </select>
      </div>
      <div class="form-group"><label class="required">날짜</label><input type="datetime-local" id="aptDate" required></div>
      <div class="form-group"><label>장소</label><input type="text" id="aptLocation"></div>
      <div class="form-group full"><label>메모</label><textarea id="aptNotes"></textarea></div>
    </div>
  `;
  const footer = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitAppointment('${caseId}')">일정 저장</button>
  `;
  showModal('일정 추가', body, footer);
}

function submitAppointment(caseId) {
  const type = document.getElementById('aptType').value;
  const date = document.getElementById('aptDate').value;
  if (!type || !date) { showAlert('필수 항목 입력', 'warning'); return; }
  callServer('appointment.create', {
    case_id: caseId, appointment_type: type, scheduled_date: date,
    location: document.getElementById('aptLocation').value,
    notes: document.getElementById('aptNotes').value,
  }).then(() => {
    closeModal(); showAlert('일정 추가 완료', 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => showAlert(err.message, 'error'));
}
</script>
