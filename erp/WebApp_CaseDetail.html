<script>
// ─── 케이스 상세 ───────────────────────────────────────────────
function getCaseDetailHTML(params) {
  if (!params || !params.caseId) { showContent('<div class="alert alert-error">케이스 ID가 없습니다</div>'); return; }
  showLoading(true);
  callServer('case.get', { caseId: params.caseId }).then(data => {
    const c = data.case;
    const patient = data.patient;
    const patientName  = patient ? (patient.full_name || patient.patient_code || '') : '';
    const coordDisplay = c.coordinator_name || c.assigned_coordinator || '-';
    const hospDisplay  = c.hospital_name   || c.hospital_id          || '-';
    const html = `
      <!-- 헤더 -->
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="loadPage('cases')">← 목록</button>
        <div>
          <div style="font-size:18px;font-weight:700">
            ${c.case_id}${patientName ? ` <span style="color:var(--gray-500);font-weight:500">| ${patientName}</span>` : ''}
          </div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:3px">
            🏥 ${hospDisplay} &nbsp;·&nbsp; 👤 ${coordDisplay}
          </div>
        </div>
        ${statusBadge(c.case_status)}
        ${c.priority ? statusBadge(c.priority) : ''}
        <div style="margin-left:auto" class="btn-group">
          ${renderCaseActionButtons_(c)}
        </div>
      </div>
      ${renderPhaseIndicator_(c)}

      <!-- 탭 -->
      <div class="tabs">
        <div class="tab active" onclick="switchTab(event,'tab-summary')">요약</div>
        <div class="tab" onclick="switchTab(event,'tab-review')">병원 검토</div>
        <div class="tab" onclick="switchTab(event,'tab-orders')">주문/배송</div>
        <div class="tab" onclick="switchTab(event,'tab-billing')">결제/청구</div>
        <div class="tab" onclick="switchTab(event,'tab-followup')">추적관리</div>
        <div class="tab" onclick="switchTab(event,'tab-archive')" style="color:var(--gray-500)">아카이브 ▾</div>
      </div>

      <!-- 요약 탭 -->
      <div class="tab-content active" id="tab-summary">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">
          <div class="card">
            <div class="card-header"><span class="card-title">케이스 정보</span></div>
            <div class="card-body">
              <div class="detail-grid">
                <div class="detail-item"><label>케이스 ID</label><div class="value"><code>${c.case_id}</code></div></div>
                <div class="detail-item"><label>상태</label><div class="value">${statusBadge(c.case_status)}</div></div>
                <div class="detail-item"><label>병원</label><div class="value">${c.hospital_id || '-'}</div></div>
                <div class="detail-item"><label>공급업체</label><div class="value">${c.supplier_id || '-'}</div></div>
                <div class="detail-item"><label>적응증</label><div class="value">${c.target_indication || '-'}</div></div>
                <div class="detail-item"><label>담당 코디</label><div class="value">${c.assigned_coordinator || '-'}</div></div>
                <div class="detail-item"><label>시술일</label><div class="value">${c.treatment_date ? fmtDate(c.treatment_date) : '-'}</div></div>
                <div class="detail-item"><label>등록일</label><div class="value">${fmtDate(c.case_opened_at)}</div></div>
                ${c.drive_folder_url ? `<div class="detail-item full"><label>Drive 폴더</label><div class="value"><a href="${c.drive_folder_url}" target="_blank">📁 열기</a></div></div>` : ''}
              </div>
              ${c.remarks ? `<p style="margin-top:12px;color:var(--gray-700);font-size:13px">${c.remarks}</p>` : ''}
            </div>
          </div>

          ${patient ? `
          <div class="card">
            <div class="card-header"><span class="card-title">환자 정보</span></div>
            <div class="card-body">
              <div class="detail-grid">
                <div class="detail-item"><label>환자 코드</label><div class="value"><code>${patient.patient_code || '-'}</code></div></div>
                ${patient.date_of_birth ? `<div class="detail-item"><label>생년월일</label><div class="value">${fmtDate(patient.date_of_birth)}</div></div>` : ''}
                ${patient.sex ? `<div class="detail-item"><label>성별</label><div class="value">${patient.sex}</div></div>` : ''}
                ${patient.nationality ? `<div class="detail-item"><label>국적</label><div class="value">${patient.nationality}</div></div>` : ''}
                ${patient.preferred_language ? `<div class="detail-item"><label>선호 언어</label><div class="value">${patient.preferred_language}</div></div>` : ''}
                ${patient.email && APP.role !== 'Hospital User' ? `<div class="detail-item"><label>이메일</label><div class="value">${patient.email}</div></div>` : ''}
              </div>
            </div>
          </div>
          ` : ''}
        </div>

        <!-- 일정 요약 -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📅 주요 일정</span>
          </div>
          ${renderKeyEvents_(data, c)}
        </div>
      </div>

      <!-- 병원 검토 탭 -->
      <div class="tab-content" id="tab-review">
        ${renderReviewTab_(data.reviews, c)}
      </div>

      <!-- 주문/배송 탭 -->
      <div class="tab-content" id="tab-orders">
        ${renderOrderTab_(data.orders, c)}
        ${renderDocsTab_(data.docs, c, '배송 관련 문서')}
      </div>

      <!-- 결제/청구 탭 -->
      <div class="tab-content" id="tab-billing">
        ${renderBillingTab_(data.billing, c)}
        ${renderDocsTab_(data.docs, c, '결제 관련 문서')}
      </div>

      <!-- 추적관리 탭 -->
      <div class="tab-content" id="tab-followup">
        ${renderFollowupTab_(data.followups, c)}
      </div>

      <!-- 아카이브 탭 (시술기록·문서·활동로그) -->
      <div class="tab-content" id="tab-archive">
        ${renderProcedureTab_(data.procedures, c)}
        ${renderDocsTab_(data.docs, c, '전체 문서')}
        <div class="card">
          <div class="card-header"><span class="card-title">활동 로그</span></div>
          <div class="card-body">
            <div class="timeline">
              ${(data.activities || []).map(a => `
                <div class="timeline-item">
                  <div class="timeline-dot"></div>
                  <div class="timeline-date">${fmtDate(a.activity_date)} · ${a.actor_role}</div>
                  <div class="timeline-content"><strong>${a.action_type}</strong> — ${a.summary}</div>
                  ${a.next_action ? `<div class="timeline-content" style="color:var(--primary)">다음: ${a.next_action}</div>` : ''}
                </div>
              `).join('') || '<p style="padding:16px;color:var(--gray-500)">기록 없음</p>'}
            </div>
          </div>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

// ─── 탭 전환 ──────────────────────────────────────────────────
function switchTab(event, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// ─── 주요 일정 목록 ──────────────────────────────────────────
function renderKeyEvents_(data, c) {
  const events = [];

  // 시술 예정일 — 미확정이어도 항상 표시
  events.push({
    date: c.treatment_date || null,
    label: '시술 예정일',
    icon: '🩺',
    calTab: 'hospital',
    color: c.treatment_date ? 'var(--primary)' : 'var(--gray-400)',
    pending: !c.treatment_date,
    pendingAction: `loadPage('caseDetail',{caseId:'${c.case_id}',_tab:'tab-orders'})`,
  });

  // 예약/방문 일정 (appointments)
  (data.appointments || []).forEach(a => {
    events.push({ date: a.scheduled_date, label: a.appointment_type + (a.location ? ' — ' + a.location : ''), icon: '🏥', calTab: 'hospital', color: 'var(--primary)' });
  });

  // 배송 예정일 (supplier orders)
  (data.orders || []).filter(o => o.expected_ship_date && o.supplier_status !== 'Closed').forEach(o => {
    events.push({ date: o.expected_ship_date, label: '배송 예정 (' + (o.requested_item || o.supplier_order_id) + ')', icon: '🚚', calTab: 'supplier', color: '#f59e0b' });
  });

  // 결제 마감일 (billing)
  (data.billing || []).filter(b => b.due_date && b.payment_status !== 'Paid' && b.payment_status !== 'Refunded').forEach(b => {
    events.push({ date: b.due_date, label: '결제 마감 (' + (b.invoice_no || b.billing_id) + ')', icon: '💳', calTab: 'billing', color: 'var(--danger)' });
  });

  // 추적관찰 (followups — 미완료만)
  (data.followups || []).filter(f => !f.completed_date && f.due_date).forEach(f => {
    events.push({ date: f.due_date, label: '추적관찰 ' + f.followup_stage, icon: '🔔', calTab: 'hospital', color: 'var(--success)' });
  });

  if (events.length === 0) {
    return `<div class="empty-state" style="padding:24px"><div class="empty-state-icon">📅</div><h3>등록된 일정 없음</h3></div>`;
  }

  // pending items go to the bottom; within each group sort by date
  events.sort((a, b) => {
    if (a.pending && !b.pending) return 1;
    if (!a.pending && b.pending) return -1;
    return new Date(a.date) - new Date(b.date);
  });

  const today = new Date(); today.setHours(0,0,0,0);
  const rows = events.map(ev => {
    if (ev.pending) {
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;opacity:.6"
             onclick="${ev.pendingAction || ''}">
          <span style="font-size:18px">${ev.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--gray-400)">${ev.label}</div>
            <div style="font-size:12px;color:var(--gray-400)">미확정 — 클릭하여 설정</div>
          </div>
          <span style="font-size:11px;color:var(--gray-300)">미정</span>
        </div>
      `;
    }
    const d = new Date(ev.date); d.setHours(0,0,0,0);
    const isPast = d < today;
    const isToday = d.getTime() === today.getTime();
    const diffDays = Math.round((d - today) / (1000*60*60*24));
    const diffLabel = isToday ? '오늘' : isPast ? `D+${-diffDays}` : `D-${diffDays}`;
    const diffColor = isPast ? 'var(--danger)' : isToday ? 'var(--warning)' : 'var(--gray-500)';
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .15s"
           onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background=''"
           onclick="loadPage('schedule',{tab:'${ev.calTab}'})">
        <span style="font-size:18px">${ev.icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:${ev.color}">${ev.label}</div>
          <div style="font-size:12px;color:var(--gray-600)">${fmtDate(ev.date)}</div>
        </div>
        <span style="font-size:11px;font-weight:700;color:${diffColor};white-space:nowrap">${diffLabel}</span>
        <span style="font-size:11px;color:var(--gray-400)">→ 캘린더</span>
      </div>
    `;
  }).join('');

  return `<div style="border-radius:var(--radius);overflow:hidden">${rows}</div>`;
}

// ─── Phase 표시 ──────────────────────────────────────────────
function renderPhaseIndicator_(c) {
  const PHASE = {
    'Draft':                    { label: '초안',          next: '병원 검토를 요청하세요',             condition: '병원검토 탭 → [검토 요청] 버튼',                      owner: 'MSO 담당자' },
    'Under Hospital Review':    { label: '병원 검토 중',  next: '병원 승인/거절 결과를 기록하세요',    condition: '병원검토 탭 → [병원 승인] 또는 [거절] 버튼',          owner: 'MSO 담당자' },
    'Hospital Approved':        { label: '병원 승인',     next: '공급 주문을 등록하세요',              condition: '주문/배송 탭 → [+ 공급 요청]',                        owner: 'MSO 담당자' },
    'Supplier Coordination':    { label: '공급 조율',     next: '출고 확정 정보를 입력하세요',         condition: '주문/배송 탭 → [출고 확정]',                          owner: 'MSO/공급업체' },
    'Shipment In Transit':      { label: '배송 중',       next: '수령 후 입고 검수를 진행하세요',      condition: '주문/배송 탭 → [검수]',                               owner: '병원 담당자' },
    'Acceptance Check Pending': { label: '입고 검수 대기',next: '입고 검수 결과를 입력하세요',         condition: '주문/배송 탭 → [검수 결과 저장]',                     owner: '병원 담당자' },
    'Acceptance Confirmed':     { label: '출고 확정',     next: '시술 일정을 확정하세요',              condition: '주요 일정 → 시술 예정일 클릭 → 날짜·의사 입력',       owner: 'MSO/병원' },
    'Scheduled':                { label: '시술 예정',     next: '시술 완료 후 완료 처리하세요',        condition: '상단 [시술 완료 처리] 버튼',                          owner: '병원 담당자' },
    'Completed':                { label: '시술 완료',     next: '추적관찰을 시작하세요',               condition: '추적관리 탭 → D7 완료 처리부터 시작',                 owner: 'MSO 담당자' },
    'Follow-up Ongoing':        { label: '추적관찰 중',   next: '단계별 추적관찰을 완료하세요',        condition: 'D7 → D30 → D90 → D180 순서로 완료 처리',             owner: 'MSO 담당자' },
    'Closed':                   { label: '케이스 종료',   next: '완료된 케이스입니다',                 condition: '-',                                                  owner: '-' },
    'Cancelled':                { label: '취소됨',        next: '취소된 케이스입니다',                 condition: '-',                                                  owner: '-' },
  };
  const p = PHASE[c.case_status];
  if (!p) return '';
  const isTerminal = ['Closed','Cancelled'].includes(c.case_status);
  return `
    <div style="background:${isTerminal?'var(--gray-100)':'#e8f4fd'};
      border-left:4px solid ${isTerminal?'var(--gray-400)':'#1a73e8'};
      border-radius:6px;padding:10px 14px;margin-bottom:12px;
      display:flex;gap:20px;flex-wrap:wrap;font-size:13px">
      <div><span style="color:var(--gray-500)">현재 단계</span>&nbsp;<strong>${p.label}</strong></div>
      ${!isTerminal ? `
      <div><span style="color:var(--gray-500)">다음 할 일</span>&nbsp;<strong style="color:#1a73e8">${p.next}</strong></div>
      <div style="color:var(--gray-600)"><span style="color:var(--gray-500)">조건</span>&nbsp;${p.condition}</div>
      <div style="color:var(--gray-600)"><span style="color:var(--gray-500)">담당</span>&nbsp;${p.owner}</div>
      ` : ''}
    </div>
  `;
}

// ─── 공급 요청 모달 ──────────────────────────────────────────
function showSupplierOrderModal(caseId) {
  callServer('supplier.list', {}).then(sData => {
    const suppliers   = sData.suppliers || [];
    const suppOptions = suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    const body = `
      <div class="form-grid">
        <div class="form-group full">
          <label class="required">공급업체</label>
          <select id="soSupplier" required>
            <option value="">선택</option>${suppOptions}
          </select>
        </div>
        <div class="form-group full">
          <label class="required">제품/세포 유형</label>
          <input type="text" id="soItem" required placeholder="예: 자가 줄기세포 (PRP)">
        </div>
        <div class="form-group">
          <label>수량</label>
          <input type="number" id="soQty" value="1" min="1">
        </div>
        <div class="form-group">
          <label class="required">병원 배송 예정일</label>
          <input type="date" id="soExpShip" required>
        </div>
        <div class="form-group full">
          <label>MSO 협의 메모</label>
          <textarea id="soMsoNotes" placeholder="공급업체와 협의한 내용, 보관 조건, 유의사항 등"></textarea>
        </div>
      </div>
      <p style="font-size:12px;color:var(--primary);margin-top:4px">
        ✔ 등록 즉시 배송 중 상태로 처리됩니다. 병원 전달 후 출고 확정을 눌러주세요.
      </p>
    `;
    showModal('공급 요청 등록', body, `
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="submitSupplierOrder('${caseId}')">공급 요청 등록</button>
    `);
  }).catch(err => showAlert('공급업체 목록 로드 실패: ' + err.message, 'error'));
}

function submitSupplierOrder(caseId) {
  const supplierId = document.getElementById('soSupplier').value;
  const item       = document.getElementById('soItem').value.trim();
  const expShip    = document.getElementById('soExpShip').value;
  if (!supplierId) { showAlert('공급업체를 선택하세요', 'warning'); return; }
  if (!item)       { showAlert('제품/세포 유형을 입력하세요', 'warning'); return; }
  if (!expShip)    { showAlert('병원 배송 예정일을 입력하세요', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('supplier.order.create', {
    caseId, supplierId,
    requestedItem:    item,
    quantity:         Number(document.getElementById('soQty').value) || 1,
    expectedShipDate: expShip,
    msoNotes:         document.getElementById('soMsoNotes').value,
  }).then(result => {
    closeModal();
    showAlert(`공급 요청 등록 완료 (배송 중): ${result.orderId}`, 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 케이스 액션 버튼 ─────────────────────────────────────────
function renderCaseActionButtons_(c) {
  const role = APP.role;
  const s = c.case_status;
  const isDeleted = c.is_deleted === true || String(c.is_deleted).toLowerCase() === 'true';
  const btns = [];

  if (['Hospital Approved','Supplier Coordination'].includes(s) && ['MSO Admin','MSO Coordinator'].includes(role)) {
    btns.push(`<button class="btn btn-primary btn-sm" onclick="showSupplierOrderModal('${c.case_id}')">공급 요청</button>`);
  }
  if (s === 'Scheduled' && ['MSO Admin','Hospital User'].includes(role)) {
    btns.push(`<button class="btn btn-success btn-sm" onclick="markTreatmentComplete('${c.case_id}')">시술 완료 처리</button>`);
  }
  if (['MSO Admin','MSO Coordinator'].includes(role) && !isDeleted) {
    btns.push(`<button class="btn btn-danger btn-sm" onclick="showCaseDeleteModal('${c.case_id}')">삭제</button>`);
  }

  return btns.join('');
}

function showCaseDeleteModal(caseId) {
  showModal('케이스 삭제', `
    <p style="margin-bottom:12px"><strong>${caseId}</strong> 케이스를 삭제하시겠습니까?</p>
    <div class="form-group">
      <label>삭제 사유</label>
      <input type="text" id="caseDetailDeleteReason" placeholder="예: 환자 취소, 중복 생성">
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-danger" onclick="confirmCaseDelete('${caseId}')">삭제</button>
  `);
}

function confirmCaseDelete(caseId) {
  const reason = document.getElementById('caseDetailDeleteReason').value;
  const btn = document.querySelector('#modalFooter .btn-danger');
  setLoadingBtn(btn, true);
  callServer('case.delete', { caseId, reason })
    .then(() => { closeModal(); showAlert('케이스가 삭제되었습니다', 'success'); loadPage('cases'); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 병원 검토 탭 렌더링 (MSO 담당자가 협의 결과를 버튼 클릭으로 기록) ─────
function renderReviewTab_(reviews, c) {
  const canManage = ['MSO Admin','MSO Coordinator'].includes(APP.role);
  const needsAction = canManage && ['Draft','Under Hospital Review'].includes(c.case_status);
  const canAddMore  = canManage && ['Hospital Approved','Supplier Coordination'].includes(c.case_status);

  // 빠른 결과 기록 버튼 (Draft / Under Hospital Review 상태일 때 상단 표시)
  const quickActionBar = needsAction ? `
    <div style="background:#f0f7ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;color:#1e40af;margin-bottom:10px">
        병원 협의 결과를 기록하세요
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" onclick="quickRecordReview('${c.case_id}','Suitable')">✅ 병원 승인</button>
        <button class="btn btn-danger btn-sm"  onclick="quickRecordReview('${c.case_id}','Not Suitable')">❌ 진행 불가</button>
        <button class="btn btn-secondary btn-sm" onclick="showReviewModal('${c.case_id}','')">📝 메모 포함 기록</button>
      </div>
    </div>
  ` : '';

  const addMoreBtn = canAddMore
    ? `<button class="btn btn-primary btn-sm" onclick="showReviewModal('${c.case_id}','')">+ 추가 검토 기록</button>`
    : '';

  const historyHeader = `
    <div class="card">
      <div class="card-header"><span class="card-title">병원 검토 이력</span>${addMoreBtn}</div>
      ${(!reviews || reviews.length === 0) ? `<div class="empty-state"><div class="empty-state-icon">🔬</div><h3>검토 기록 없음</h3><p style="color:var(--gray-500);font-size:13px">병원과 협의 후 결과를 기록하세요</p></div>` : ''}
    </div>
  `;

  const rows = (reviews || []).map((r, idx) => {
    const isPending = r.review_status === 'Pending';
    const editBtn = canManage && isPending
      ? `<button class="btn btn-sm btn-primary" onclick="showReviewModal('${c.case_id}','${r.review_id}')">결과 수정</button>`
      : '';
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-header">
          <span class="card-title">검토 #${(reviews||[]).length - idx}</span>
          <div style="display:flex;gap:8px;align-items:center">
            ${statusBadge(r.review_result || r.review_status)}
            ${editBtn}
          </div>
        </div>
        <div class="card-body">
          <div class="detail-grid">
            <div class="detail-item"><label>기록일</label><div class="value">${fmtDate(r.review_request_date)}</div></div>
            <div class="detail-item"><label>결과</label><div class="value">${r.review_result ? statusBadge(r.review_result) : '-'}</div></div>
            ${r.consultation_date ? `<div class="detail-item"><label>상담일</label><div class="value">${fmtDate(r.consultation_date)}</div></div>` : ''}
          </div>
          ${r.notes ? `<p style="margin-top:10px;font-size:13px;color:var(--gray-700)">${r.notes}</p>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return quickActionBar + historyHeader + rows;
}

// 빠른 결과 기록 (메모 없이 바로 기록)
function quickRecordReview(caseId, result) {
  const label = result === 'Suitable' ? '병원 승인' : '진행 불가';
  showModal(`병원 검토 — ${label}`, `
    <p style="margin-bottom:12px;font-size:13px;color:var(--gray-600)">
      케이스 <strong>${caseId}</strong>: <strong>${label}</strong>로 기록합니다.
    </p>
    <div class="form-group">
      <label>메모 (선택)</label>
      <textarea id="qrevNotes" placeholder="협의 내용 요약 (선택 사항)"></textarea>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="_doQuickReview('${caseId}','${result}')">확인</button>
  `);
}
function _doQuickReview(caseId, result) {
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('review.record', {
    caseId, review_result: result,
    notes: document.getElementById('qrevNotes').value,
  }).then(() => {
    closeModal(); showAlert('검토 결과가 기록되었습니다', 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

function showReviewModal(caseId, reviewId) {
  const body = `
    <p style="font-size:13px;color:var(--gray-600);margin-bottom:16px">
      병원과 오프라인으로 협의한 결과를 기록합니다.
    </p>
    <div class="form-grid">
      <div class="form-group full">
        <label class="required">검토 결과</label>
        <select id="revResult" required>
          <option value="">선택</option>
          <option value="Suitable">진행 가능 ✅</option>
          <option value="Not Suitable">진행 불가 ❌</option>
          <option value="Need More Information">추가 정보 필요 🔍</option>
          <option value="Deferred">보류 ⏸</option>
        </select>
      </div>
      <div class="form-group full">
        <label>상담 예정일</label>
        <input type="date" id="revConsDate">
      </div>
      <div class="form-group full">
        <label>메모</label>
        <textarea id="revNotes" placeholder="예: 혈액검사 결과 정상, 시술 진행 가능 판단"></textarea>
      </div>
    </div>
  `;
  const footer = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitReview('${caseId}','${reviewId||''}')">저장</button>
  `;
  showModal('병원 검토 결과 기록', body, footer);
}

function submitReview(caseId, reviewId) {
  const result = document.getElementById('revResult').value;
  if (!result) { showAlert('검토 결과를 선택하세요', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  // review.record handles missing review record; review.submit requires existing review_id
  const api = reviewId ? 'review.submit' : 'review.record';
  const payload = reviewId
    ? { case_id: caseId, review_id: reviewId, review_result: result, consultation_date: document.getElementById('revConsDate').value, notes: document.getElementById('revNotes').value }
    : { caseId, review_result: result, consultation_date: document.getElementById('revConsDate').value, notes: document.getElementById('revNotes').value };
  callServer(api, payload).then(() => {
    closeModal();
    showAlert('검토 결과 저장 완료', 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 추적관리 탭 렌더링 ──────────────────────────────────────
function renderFollowupTab_(followups, c) {
  const canManage = ['MSO Admin','MSO Coordinator'].includes(APP.role);
  const today = new Date();

  if (!followups || followups.length === 0) return `
    <div class="card">
      <div class="card-header"><span class="card-title">추적관리</span></div>
      <div class="empty-state"><div class="empty-state-icon">🔔</div>
        <h3>추적관찰 일정 없음</h3>
        <p style="font-size:13px;color:var(--gray-500)">시술 완료 처리 후 D7·D14·D30·D90·D180 일정이 자동 생성됩니다</p>
      </div>
    </div>
  `;

  return followups.map(f => {
    const isOverdue = f.due_date && !f.completed_date && new Date(f.due_date) < today;
    const isDone    = !!f.completed_date;
    const borderColor = isDone ? 'var(--success)' : isOverdue ? 'var(--danger)' : 'var(--primary)';
    return `
      <div class="card" style="margin-bottom:12px;border-left:4px solid ${borderColor}">
        <div class="card-header">
          <span class="card-title">${f.followup_stage} 추적관찰</span>
          <div style="display:flex;gap:8px;align-items:center">
            ${isDone ? '<span class="badge badge-green">✓ 완료</span>' :
              isOverdue ? '<span class="badge badge-red">기한 초과</span>' :
              '<span class="badge badge-blue">예정</span>'}
            ${canManage && !isDone ? `<button class="btn btn-sm btn-success" onclick="showFollowupCompleteModal('${f.followup_id}','${f.followup_stage}')">완료 기록</button>` : ''}
          </div>
        </div>
        <div class="card-body">
          <div class="detail-grid">
            <div class="detail-item"><label>예정 마감일</label><div class="value" style="${isOverdue?'color:var(--danger);font-weight:600':''}">${fmtDate(f.due_date)}</div></div>
            ${isDone ? `<div class="detail-item"><label>실제 완료일</label><div class="value">${fmtDate(f.completed_date)}</div></div>` : ''}
            ${f.patient_response ? `<div class="detail-item"><label>환자 현재 상태</label><div class="value">${f.patient_response}</div></div>` : ''}
            ${f.next_visit_date ? `<div class="detail-item"><label>다음 방문 예정일</label><div class="value" style="color:var(--primary);font-weight:600">${fmtDate(f.next_visit_date)}</div></div>` : ''}
            ${f.responsible_party ? `<div class="detail-item"><label>담당</label><div class="value">${f.responsible_party}</div></div>` : ''}
            ${f.escalation_required === 'TRUE' ? `<div class="detail-item"><label>에스컬레이션</label><div class="value"><span class="badge badge-red">즉시 확인 필요</span></div></div>` : ''}
          </div>
          ${f.notes ? `<p style="margin-top:10px;font-size:13px;color:var(--gray-700)">${f.notes}</p>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

    followupId,
    patientResponse: document.getElementById('fupResponse').value,
    nextVisitDate:   document.getElementById('fupNextVisit').value,
    notes:           document.getElementById('fupNotes').value,
    escalationRequired: document.getElementById('fupEscalation').checked,
  }).then(() => {
    closeModal(); showAlert('추적관찰 완료 기록됨', 'success');
    loadPage('caseDetail', { caseId: APP.currentParams.caseId });
  }).catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 시술기록 탭 렌더링 ──────────────────────────────────────
function renderProcedureTab_(procedures, c) {
  const canRecord = ['MSO Admin','MSO Coordinator'].includes(APP.role);
  const canSchedule = ['MSO Admin','Hospital User'].includes(APP.role) && c.case_status === 'Acceptance Confirmed';

  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">시술 기록</span>
        <div class="btn-group">
          ${canSchedule ? `<button class="btn btn-success btn-sm" onclick="showScheduleTreatmentModal('${c.case_id}')">시술 일정 확정</button>` : ''}
          ${canRecord ? `<button class="btn btn-primary btn-sm" onclick="showProcedureModal('${c.case_id}')">+ 시술 기록</button>` : ''}
        </div>
      </div>
      ${!procedures || procedures.length === 0 ? `
        <div class="empty-state"><div class="empty-state-icon">💉</div><h3>시술 기록 없음</h3></div>
      ` : `
      <div class="table-wrap">
        <table>
          <thead><tr><th>시술 ID</th><th>날짜</th><th>유형</th><th>의사</th><th>장소</th><th>상태</th><th>결과 메모</th></tr></thead>
          <tbody>
            ${procedures.map(p => `
              <tr>
                <td><code>${p.procedure_id}</code></td>
                <td>${fmtDate(p.procedure_date)}</td>
                <td>${p.procedure_type || '-'}</td>
                <td>${p.physician || '-'}</td>
                <td>${p.location || '-'}</td>
                <td>${statusBadge(p.status)}</td>
                <td style="max-width:200px;white-space:normal">${p.outcome_notes || '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      `}
    </div>
  `;
}

function showProcedureModal(caseId) {
  const PROC_TYPES = {'Cell Injection':'세포 주입','IV Infusion':'정맥 투여','Consultation':'상담','Other':'기타'};
  const typeOptions = Object.entries(PROC_TYPES).map(([v,k]) => `<option value="${v}">${k}</option>`).join('');
  const body = `
    <div class="form-grid">
      <div class="form-group full">
        <label class="required">시술 유형</label>
        <select id="procType" required><option value="">선택</option>${typeOptions}</select>
      </div>
      <div class="form-group"><label class="required">시술 예정일</label><input type="date" id="procDate" required></div>
      <div class="form-group"><label>의사</label><input type="text" id="procPhysician" placeholder="Dr. Kim"></div>
      <div class="form-group"><label>연결 주문 ID</label><input type="text" id="procOrderId" placeholder="ORD-2026-001"></div>
      <div class="form-group"><label>병원 ID</label><input type="text" id="procHospId"></div>
      <div class="form-group"><label>장소</label><input type="text" id="procLocation"></div>
      <div class="form-group full"><label>결과 메모</label><textarea id="procOutcome"></textarea></div>
    </div>
  `;
  const footer = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitProcedure('${caseId}')">저장</button>
  `;
  showModal('시술 기록 추가', body, footer);
}

function submitProcedure(caseId) {
  const type = document.getElementById('procType').value;
  const date = document.getElementById('procDate').value;
  if (!type || !date) { showAlert('시술 유형과 날짜를 입력하세요', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('procedure.create', {
    caseId, procedureType: type, procedureDate: date,
    physician:  document.getElementById('procPhysician').value,
    orderId:    document.getElementById('procOrderId').value,
    hospitalId: document.getElementById('procHospId').value,
    location:   document.getElementById('procLocation').value,
    outcomeNotes: document.getElementById('procOutcome').value,
  }).then(() => {
    closeModal(); showAlert('시술 기록 저장 완료', 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 시술 일정 확정 모달 ─────────────────────────────────────
function showScheduleTreatmentModal(caseId) {
  const today = new Date().toISOString().split('T')[0];
  const body = `
    <div class="form-grid">
      <div class="form-group full">
        <label class="required">시술 예정일</label>
        <input type="date" id="schedDate" required value="${today}">
      </div>
      <div class="form-group full">
        <label class="required">담당 의사</label>
        <input type="text" id="schedPhysician" required placeholder="Dr. Kim">
      </div>
      <div class="form-group full">
        <label>장소</label>
        <input type="text" id="schedLocation" placeholder="수술실 1">
      </div>
      <div class="form-group full">
        <label>메모</label>
        <textarea id="schedNotes" placeholder="추가 안내 사항"></textarea>
      </div>
    </div>
  `;
  const footer = `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-success" onclick="submitScheduleTreatment('${caseId}')">시술 일정 확정</button>
  `;
  showModal('시술 일정 확정', body, footer);
}

function submitScheduleTreatment(caseId) {
  const date = document.getElementById('schedDate').value;
  const physician = document.getElementById('schedPhysician').value.trim();
  if (!date) { showAlert('시술 예정일을 입력하세요', 'warning'); return; }
  if (!physician) { showAlert('담당 의사를 입력하세요', 'warning'); return; }
  const btn = document.querySelector('#modalFooter .btn-success');
  setLoadingBtn(btn, true);
  callServer('case.scheduleTreatment', {
    caseId, treatmentDate: date, physician,
    location: document.getElementById('schedLocation').value,
    notes: document.getElementById('schedNotes').value,
  }).then(() => {
    closeModal(); showAlert('시술 일정이 확정되었습니다', 'success');
    loadPage('caseDetail', { caseId });
  }).catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

// ─── 케이스 액션 함수들 ───────────────────────────────────────
function requestHospitalReview(caseId) {
  showModal('병원 검토 요청', `<p>케이스 <strong>${caseId}</strong>에 대해 병원 검토를 요청합니다.</p>`, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="_doRequestReview('${caseId}')">검토 요청</button>
  `);
}
function _doRequestReview(caseId) {
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('review.request', { caseId })
    .then(() => { closeModal(); showAlert('병원 검토 요청 완료', 'success'); loadPage('caseDetail', { caseId }); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

function requestAdditionalReview(caseId, orderId) {
  showModal('추가 검토 요청', `<p>주문 <strong>${orderId}</strong>에 대한 추가 병원 검토를 요청합니다.</p>`, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="_doRequestAdditionalReview('${caseId}','${orderId}')">검토 요청</button>
  `);
}
function _doRequestAdditionalReview(caseId, orderId) {
  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('review.request', { caseId, linkedOrderId: orderId })
    .then(() => { closeModal(); showAlert('추가 병원 검토 요청 완료', 'success'); loadPage('caseDetail', { caseId }); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

function markTreatmentComplete(caseId) {
  showModal('시술 완료 처리', `
    <p style="margin-bottom:8px">케이스 <strong>${caseId}</strong> 시술 완료 처리를 진행합니다.</p>
    <p style="font-size:13px;color:var(--gray-600)">시술 완료 후 D7·D14·D30·D90·D180 추적관찰 일정이 자동 생성됩니다.</p>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-success" onclick="_doMarkComplete('${caseId}')">완료 처리</button>
  `);
}
function _doMarkComplete(caseId) {
  const btn = document.querySelector('#modalFooter .btn-success');
  setLoadingBtn(btn, true);
  callServer('case.changeStatus', { caseId, targetStatus: 'Completed' })
    .then(() => { closeModal(); showAlert('시술 완료 처리됨', 'success'); loadPage('caseDetail', { caseId }); })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}

function submitAppointment(caseId) {

  callServer('appointment.create', {
    case_id: caseId, appointment_type: type, scheduled_date: date,
    location: document.getElementById('aptLocation').value,
    notes: document.getElementById('aptNotes').value,
  }).then(() => {
    closeModal(); showAlert('일정 추가 완료', 'success');
    loadPage('caseDetail', { caseId });
