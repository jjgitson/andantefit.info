<script>
// 케이스 상태 → 단계 번호·라벨·다음 할 일
var CASE_PHASE = {
  'Draft':                    { step:1,  label:'초안',         next:'병원 검토 요청',      color:'var(--gray-500)' },
  'Hospital Approved':        { step:2,  label:'병원 승인',    next:'공급 주문 등록',      color:'var(--primary)' },
  'Supplier Coordination':    { step:3,  label:'공급 조율',    next:'출고 확정',           color:'#f59e0b' },
  'Shipment In Transit':      { step:4,  label:'배송 중',      next:'출고 확정',           color:'#f59e0b' },
  'Acceptance Check Pending': { step:5,  label:'입고 검수',    next:'검수 결과 입력',      color:'#f59e0b' },
  'Acceptance Confirmed':     { step:6,  label:'출고 확정',    next:'시술 일정 확정',      color:'var(--primary)' },
  'Scheduled':                { step:7,  label:'시술 예정',    next:'시술 완료 처리',      color:'#8b5cf6' },
  'Completed':                { step:8,  label:'시술 완료',    next:'추적관찰 시작',       color:'var(--success)' },
  'Follow-up Ongoing':        { step:9,  label:'추적관찰 중',  next:'추적관찰 완료 처리',  color:'var(--success)' },
  'Closed':                   { step:10, label:'종료',         next:null,                  color:'var(--gray-400)' },
  'Cancelled':                { step:0,  label:'취소됨',       next:null,                  color:'var(--danger)' },
};
var PHASE_TOTAL = 9; // 1~9 활성 단계

// ─── 케이스 목록 ───────────────────────────────────────────────
function getCasesHTML(params) {
  showLoading(true);
  callServer('case.list', { showDeleted: true }).then(data => {
    const cases = data.cases || [];
    const canCreate = ['MSO Admin', 'MSO Coordinator'].includes(APP.role);

    // 단계별 건수
    const counts = {};
    cases.forEach(c => {
      const p = CASE_PHASE[c.case_status];
      const key = p ? p.label : c.case_status;
      counts[key] = (counts[key] || 0) + 1;
    });

    const html = `
      <div class="card">
        <div class="card-header">
          <span class="card-title">케이스 목록 (${cases.length}건)</span>
          ${canCreate ? `<button class="btn btn-primary btn-sm" onclick="showNewCaseModal()">+ 신규 케이스</button>` : ''}
        </div>
        <div class="filter-bar">
          <input type="text" id="caseSearch" placeholder="케이스 ID / 환자 / 적응증 검색" oninput="filterCases()">
          <select id="caseStepFilter" onchange="filterCases()">
            <option value="">전체 단계</option>
            <option value="Draft">초안</option>
            <option value="Hospital Approved">병원 승인</option>
            <option value="Supplier Coordination">공급 조율</option>
            <option value="Shipment In Transit">배송 중</option>
            <option value="Acceptance Check Pending">입고 검수</option>
            <option value="Acceptance Confirmed">출고 확정</option>
            <option value="Scheduled">시술 예정</option>
            <option value="Completed">시술 완료</option>
            <option value="Follow-up Ongoing">추적관찰 중</option>
            <option value="Closed">종료</option>
            <option value="Cancelled">취소됨</option>
          </select>
          <select id="casePriorityFilter" onchange="filterCases()">
            <option value="">전체 우선순위</option>
            <option value="Urgent">긴급</option>
            <option value="High">높음</option>
            <option value="Normal">보통</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>케이스</th>
                <th class="mobile-hide">병원 / 적응증</th>
                <th class="mobile-hide">담당자</th>
                <th>현재 단계</th>
                <th>다음 할 일</th>
                <th class="mobile-hide">시술일</th>
                <th class="mobile-hide">우선순위</th>
              </tr>
            </thead>
            <tbody id="casesTbody">
              ${renderCaseRows_(cases)}
            </tbody>
          </table>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

function renderCaseRows_(cases) {
  if (cases.length === 0) return `
    <tr><td colspan="7">
      <div class="empty-state">
        <div class="empty-state-icon">🗂️</div>
        <h3>케이스가 없습니다</h3>
      </div>
    </td></tr>
  `;

  return cases.map(c => {
    const isDeleted = c.is_deleted === true || String(c.is_deleted).toLowerCase() === 'true';
    const p = CASE_PHASE[c.case_status] || { step:0, label: c.case_status, next:null, color:'var(--gray-400)' };
    const isActive = p.step > 0 && p.step < 10;
    const isUrgent = c.priority === 'Urgent';

    return `
    <tr class="case-row clickable-row"
      data-id="${c.case_id}"
      data-name="${c.patient_name || ''}"
      data-status="${c.case_status}"
      data-priority="${c.priority || ''}"
      onclick="loadPage('caseDetail', {caseId:'${c.case_id}'})"
      style="${isDeleted ? 'opacity:0.45;background:#fff5f5' : isUrgent ? 'background:#fff8f0' : ''}"
    >
      <td>
        <div style="font-weight:600;font-size:13px">${c.patient_name || c.case_id}${isDeleted ? ' <span class="badge badge-red" style="font-size:10px">삭제됨</span>' : ''}</div>
        <div style="font-size:11px;color:var(--gray-500);margin-top:1px">${c.case_id}</div>
        <div class="mobile-only" style="font-size:11px;color:var(--gray-600);margin-top:2px">${c.hospital_id || '-'} · ${c.target_indication || '-'}</div>
      </td>
      <td class="mobile-hide">
        <div style="font-size:13px">${c.hospital_id || '-'}</div>
        <div style="font-size:11px;color:var(--gray-600)">${c.target_indication || '-'}</div>
      </td>
      <td class="mobile-hide" style="font-size:12px">${c.assigned_coordinator || '-'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          ${isActive ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${p.color};color:#fff;font-size:10px;font-weight:700;flex-shrink:0">${p.step}</span>` : ''}
          <span style="font-size:12px;font-weight:600;color:${p.color}">${p.label}</span>
        </div>
        ${isActive ? `<div style="margin-top:3px;height:3px;background:var(--gray-200);border-radius:2px;width:80px"><div style="height:3px;border-radius:2px;background:${p.color};width:${(p.step/PHASE_TOTAL*100).toFixed(0)}%"></div></div>` : ''}
      </td>
      <td style="font-size:12px;color:${p.next ? 'var(--primary)' : 'var(--gray-400)'}">
        ${p.next ? `→ ${p.next}` : '-'}
      </td>
      <td class="mobile-hide" style="font-size:12px">${c.treatment_date ? fmtDate(c.treatment_date) : '-'}</td>
      <td class="mobile-hide">${c.priority ? statusBadge(c.priority) : '-'}</td>
    </tr>
  `}).join('');
}

function filterCases() {
  const search   = document.getElementById('caseSearch').value.toLowerCase();
  const status   = document.getElementById('caseStepFilter').value;
  const priority = document.getElementById('casePriorityFilter').value;
  document.querySelectorAll('.case-row').forEach(row => {
    const id  = (row.dataset.id + ' ' + (row.dataset.name||'')).toLowerCase();
    const ok  = (!search   || id.includes(search)) &&
                (!status   || row.dataset.status === status) &&
                (!priority || row.dataset.priority === priority);
    row.style.display = ok ? '' : 'none';
  });
}

// ─── 신규 케이스 생성 ─────────────────────────────────────────
function showNewCaseModal() {
  Promise.all([
    callServer('hospital.list', {}),
    callServer('coordinator.list', {}),
  ]).then(([hospData, coordData]) => {
    const hospitals    = hospData.hospitals    || [];
    const coordinators = coordData.coordinators || [];

    const hospOptions  = hospitals.map(h =>
      `<option value="${h.id}">${h.name}</option>`).join('');
    const coordOptions = coordinators.map(c =>
      `<option value="${c.email}">${c.name}${c.role === 'MSO Admin' ? ' (Admin)' : ''}</option>`).join('');

    const body = `
      <div class="form-grid">
        <div class="form-group full">
          <label class="required">환자명</label>
          <input type="text" id="ncName" required placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="required">국적</label>
          <input type="text" id="ncNationality" required placeholder="Korea">
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" id="ncPhone" placeholder="+82-10-0000-0000">
        </div>
        <div class="form-group full">
          <label class="required">MSO 담당자</label>
          <select id="ncCoordinator" required>
            <option value="">담당자 선택</option>
            ${coordOptions}
          </select>
        </div>
        <div class="form-group full">
          <label class="required">병원</label>
          <select id="ncHospital" required>
            <option value="">병원 선택</option>
            ${hospOptions}
          </select>
        </div>
        <div class="form-group full">
          <label class="required">적응증</label>
          <input type="text" id="ncIndication" required placeholder="예: 무릎 연골 재생">
        </div>
        <div class="form-group">
          <label>우선순위</label>
          <select id="ncPriority">
            <option value="Normal">보통</option>
            <option value="High">높음</option>
            <option value="Urgent">긴급</option>
          </select>
        </div>
        <div class="form-group">
          <label>비고</label>
          <input type="text" id="ncRemarks" placeholder="추가 메모">
        </div>
      </div>
    `;
    const footer = `
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="submitNewCase()">케이스 생성</button>
    `;
    showModal('신규 케이스 생성', body, footer);
  }).catch(err => showAlert('데이터 로드 실패: ' + err.message, 'error'));
}

function submitNewCase() {
  const name        = document.getElementById('ncName').value.trim();
  const nationality = document.getElementById('ncNationality').value.trim();
  const phone       = document.getElementById('ncPhone').value.trim();
  const coordinator = document.getElementById('ncCoordinator').value;
  const hospitalId  = document.getElementById('ncHospital').value;
  const indication  = document.getElementById('ncIndication').value.trim();
  const priority    = document.getElementById('ncPriority').value;
  const remarks     = document.getElementById('ncRemarks').value.trim();

  if (!name)        { showAlert('환자명을 입력하세요', 'warning'); return; }
  if (!nationality) { showAlert('국적을 입력하세요', 'warning'); return; }
  if (!coordinator) { showAlert('MSO 담당자를 선택하세요', 'warning'); return; }
  if (!hospitalId)  { showAlert('병원을 선택하세요', 'warning'); return; }
  if (!indication)  { showAlert('적응증을 입력하세요', 'warning'); return; }

  const btn = document.querySelector('#modalFooter .btn-primary');
  setLoadingBtn(btn, true);
  callServer('patient.create', { full_name: name, nationality, phone })
    .then(patResult => callServer('case.create', {
      patient_id:           patResult.patientId,
      hospital_id:          hospitalId,
      target_indication:    indication,
      assigned_coordinator: coordinator,
      priority,
      remarks,
    }))
    .then(caseResult => {
      closeModal();
      showAlert(`케이스 생성 완료: ${caseResult.caseId}`, 'success');
      loadPage('caseDetail', { caseId: caseResult.caseId });
    })
    .catch(err => { setLoadingBtn(btn, false); showAlert(err.message, 'error'); });
}
</script>
