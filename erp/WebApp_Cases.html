<script>
// ─── 케이스 목록 ───────────────────────────────────────────────
function getCasesHTML(params) {
  const showDeleted = !!(params && params.showDeleted);
  showLoading(true);
  callServer('case.list', { showDeleted }).then(data => {
    const cases = data.cases || [];
    const canCreate = ['MSO Admin', 'MSO Coordinator'].includes(APP.role);
    const html = `
      <div class="card">
        <div class="card-header">
          <span class="card-title">케이스 목록 (${cases.length}건)</span>
          <div class="btn-group">
            ${canCreate ? `<button class="btn btn-primary btn-sm" onclick="showNewCaseModal()">+ 신규 케이스</button>` : ''}
          </div>
        </div>
        <div class="filter-bar">
          <input type="text" id="caseSearch" placeholder="케이스 ID 검색" oninput="filterCases()">
          <select id="caseStatusFilter" onchange="filterCases()">
            <option value="">전체 상태</option>
            <option>Draft</option>
            <option>Hospital Approved</option>
            <option>Supplier Coordination</option>
            <option>Shipment In Transit</option>
            <option>Acceptance Check Pending</option>
            <option>Acceptance Confirmed</option>
            <option>Scheduled</option>
            <option>Completed</option>
            <option>Follow-up Ongoing</option>
            <option>Closed</option>
            <option>Cancelled</option>
          </select>
          <select id="casePriorityFilter" onchange="filterCases()">
            <option value="">전체 우선순위</option>
            <option>Urgent</option>
            <option>High</option>
            <option>Normal</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-600);cursor:pointer">
            <input type="checkbox" id="caseShowDeleted" onchange="getCasesHTML({showDeleted:this.checked})">
            삭제 포함
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>케이스 ID</th>
                <th>병원</th>
                <th>적응증</th>
                <th>담당자</th>
                <th>우선순위</th>
                <th>상태</th>
                <th>시술일</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="casesTbody">
              ${renderCaseRows_(cases)}
            </tbody>
          </table>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

function renderCaseRows_(cases) {
  if (cases.length === 0) return `
    <tr><td colspan="8">
      <div class="empty-state">
        <div class="empty-state-icon">🗂️</div>
        <h3>케이스가 없습니다</h3>
      </div>
    </td></tr>
  `;
  const canDelete = ['MSO Admin','MSO Coordinator'].includes(APP.role);
  return cases.map(c => {
    const isDeleted = c.is_deleted === true || String(c.is_deleted).toLowerCase() === 'true';
    return `
    <tr class="case-row clickable-row"
      data-id="${c.case_id}"
      data-status="${c.case_status}"
      data-priority="${c.priority || ''}"
      onclick="loadPage('caseDetail', {caseId:'${c.case_id}'})"
      style="${isDeleted ? 'opacity:0.45;background:#fff5f5' : ''}"
    >
      <td><code>${c.case_id}</code>${isDeleted ? ' <span class="badge badge-red" style="font-size:10px">삭제됨</span>' : ''}</td>
      <td>${c.hospital_id || '-'}</td>
      <td>${c.target_indication || '-'}</td>
      <td>${c.assigned_coordinator || '-'}</td>
      <td>${c.priority ? `<span class="badge badge-${c.priority==='Urgent'?'red':c.priority==='High'?'orange':'gray'}">${c.priority}</span>` : '-'}</td>
      <td>${statusBadge(c.case_status)}</td>
      <td>${c.treatment_date ? fmtDate(c.treatment_date) : '-'}</td>
      <td>
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();loadPage('caseDetail',{caseId:'${c.case_id}'})">상세</button>
        ${canDelete && !isDeleted ? `<button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="event.stopPropagation();showDeleteCaseModal('${c.case_id}')">삭제</button>` : ''}
      </td>
    </tr>
  `}).join('');
}

// ─── 신규 케이스 생성 ─────────────────────────────────────────
function showNewCaseModal() {
  Promise.all([
    callServer('hospital.list', {}),
    callServer('coordinator.list', {}),
  ]).then(([hospData, coordData]) => {
    const hospitals    = hospData.hospitals    || [];
    const coordinators = coordData.coordinators || [];

    const hospOptions  = hospitals.map(h =>
      `<option value="${h.id}">${h.name}</option>`).join('');
    const coordOptions = coordinators.map(c =>
      `<option value="${c.email}">${c.name}${c.role === 'MSO Admin' ? ' (Admin)' : ''}</option>`).join('');

    const body = `
      <div class="form-grid">
        <div class="form-group full">
          <label class="required">환자명</label>
          <input type="text" id="ncName" required placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="required">국적</label>
          <input type="text" id="ncNationality" required placeholder="Korea">
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" id="ncPhone" placeholder="+82-10-0000-0000">
        </div>
        <div class="form-group full">
          <label class="required">MSO 담당자</label>
          <select id="ncCoordinator" required>
            <option value="">담당자 선택</option>
            ${coordOptions}
          </select>
        </div>
        <div class="form-group full">
          <label class="required">병원</label>
          <select id="ncHospital" required>
            <option value="">병원 선택</option>
            ${hospOptions}
          </select>
        </div>
        <div class="form-group full">
          <label class="required">적응증</label>
          <input type="text" id="ncIndication" required placeholder="예: 무릎 연골 재생">
        </div>
        <div class="form-group">
          <label>우선순위</label>
          <select id="ncPriority">
            <option value="Normal">Normal</option>
            <option value="High">High</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label>비고</label>
          <input type="text" id="ncRemarks" placeholder="추가 메모">
        </div>
      </div>
    `;
    const footer = `
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="submitNewCase()">케이스 생성</button>
    `;
    showModal('신규 케이스 생성', body, footer);
  }).catch(err => showAlert('데이터 로드 실패: ' + err.message, 'error'));
}

function submitNewCase() {
  const name        = document.getElementById('ncName').value.trim();
  const nationality = document.getElementById('ncNationality').value.trim();
  const phone       = document.getElementById('ncPhone').value.trim();
  const coordinator = document.getElementById('ncCoordinator').value;
  const hospitalId  = document.getElementById('ncHospital').value;
  const indication  = document.getElementById('ncIndication').value.trim();
  const priority    = document.getElementById('ncPriority').value;
  const remarks     = document.getElementById('ncRemarks').value.trim();

  if (!name)        { showAlert('환자명을 입력하세요', 'warning'); return; }
  if (!nationality) { showAlert('국적을 입력하세요', 'warning'); return; }
  if (!coordinator) { showAlert('MSO 담당자를 선택하세요', 'warning'); return; }
  if (!hospitalId)  { showAlert('병원을 선택하세요', 'warning'); return; }
  if (!indication)  { showAlert('적응증을 입력하세요', 'warning'); return; }

  // 1단계: 환자 생성 → 2단계: 케이스 생성
  callServer('patient.create', { full_name: name, nationality, phone })
    .then(patResult => callServer('case.create', {
      patient_id:           patResult.patientId,
      hospital_id:          hospitalId,
      target_indication:    indication,
      assigned_coordinator: coordinator,
      priority,
      remarks,
    }))
    .then(caseResult => {
      closeModal();
      showAlert(`케이스 생성 완료: ${caseResult.caseId}`, 'success');
      loadPage('caseDetail', { caseId: caseResult.caseId });
    })
    .catch(err => showAlert(err.message, 'error'));
}

function showDeleteCaseModal(caseId) {
  showModal('케이스 삭제', `
    <p style="margin-bottom:12px"><strong>${caseId}</strong> 케이스를 삭제하시겠습니까?</p>
    <div class="form-group">
      <label>삭제 사유</label>
      <input type="text" id="caseDeleteReason" placeholder="예: 환자 취소, 중복 생성">
    </div>
    <p style="font-size:12px;color:var(--gray-500);margin-top:8px">삭제 후 목록에서 숨겨집니다. 완전 삭제가 아닙니다.</p>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-danger" onclick="confirmDeleteCase('${caseId}')">삭제</button>
  `);
}

function confirmDeleteCase(caseId) {
  const reason = document.getElementById('caseDeleteReason').value;
  callServer('case.delete', { caseId, reason })
    .then(() => { closeModal(); showAlert('케이스가 삭제되었습니다', 'success'); loadPage('cases'); })
    .catch(err => showAlert(err.message, 'error'));
}

function filterCases() {
  const search = document.getElementById('caseSearch').value.toLowerCase();
  const status = document.getElementById('caseStatusFilter').value;
  const priority = document.getElementById('casePriorityFilter').value;
  document.querySelectorAll('.case-row').forEach(row => {
    const id = row.dataset.id.toLowerCase();
    const rowStatus = row.dataset.status;
    const rowPriority = row.dataset.priority;
    const ok = (!search || id.includes(search)) &&
               (!status || rowStatus === status) &&
               (!priority || rowPriority === priority);
    row.style.display = ok ? '' : 'none';
  });
}
</script>
