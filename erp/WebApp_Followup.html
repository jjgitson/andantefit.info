<script>
// ─── 추적관리 (읽기 전용 대시보드) ────────────────────────────
function getFollowupHTML(params) {
  showLoading(true);
  callServer('followup.list', { onlyPending: false }).then(data => {
    const followups = data.followups || [];
    const today = new Date();
    const overdue  = followups.filter(f => f.due_date && !f.completed_date && new Date(f.due_date) < today);
    const upcoming = followups.filter(f => {
      if (f.completed_date) return false;
      const d = new Date(f.due_date);
      return d >= today && d <= new Date(today.getTime() + 7*24*60*60*1000);
    });
    const done = followups.filter(f => !!f.completed_date);

    const html = `
      ${overdue.length > 0 ? `
        <div class="alert alert-error">
          🔔 기한 초과 추적관찰 <strong>${overdue.length}건</strong> — 케이스를 클릭하여 완료 처리하세요
        </div>` : ''}

      <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
        <div class="stat-card primary"><div class="stat-number">${followups.length}</div><div class="stat-label">전체</div></div>
        <div class="stat-card ${overdue.length>0?'danger':'success'}"><div class="stat-number">${overdue.length}</div><div class="stat-label">기한 초과</div></div>
        <div class="stat-card warning"><div class="stat-number">${upcoming.length}</div><div class="stat-label">7일 내 예정</div></div>
        <div class="stat-card success"><div class="stat-number">${done.length}</div><div class="stat-label">완료</div></div>
      </div>

      <!-- 기한 초과 -->
      ${overdue.length > 0 ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header" style="border-left:4px solid var(--danger)">
          <span class="card-title" style="color:var(--danger)">🔴 즉시 처리 필요</span>
          <span style="font-size:12px;color:var(--gray-500)">클릭 → 케이스에서 완료 처리</span>
        </div>
        <div>${overdue.map(f => {
          const caseNum = f.case_id ? f.case_id.split('-').pop() : '';
          const displayName = f.patient_name ? `${f.patient_name}-${caseNum}` : f.case_id;
          const daysOver = Math.floor((today - new Date(f.due_date)) / (1000*60*60*24));
          return `
            <div onclick="loadPage('caseDetail',{caseId:'${f.case_id}',_section:'followup'})"
                 style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;background:#fff8f8"
                 onmouseover="this.style.background='#fff0f0'" onmouseout="this.style.background='#fff8f8'">
              <div style="flex:1">
                <div style="font-weight:600">${displayName}</div>
                <div style="font-size:12px;color:var(--gray-500)">${f.case_id} · ${f.followup_stage} · 마감 ${fmtDate(f.due_date)}</div>
              </div>
              <span class="badge badge-red">+${daysOver}일</span>
              ${f.escalation_required==='TRUE' ? '<span class="badge badge-red">에스컬레이션</span>' : ''}
            </div>`;
        }).join('')}</div>
      </div>` : ''}

      <!-- 전체 목록 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">추적관찰 전체 목록</span>
          <span style="font-size:12px;color:var(--gray-500)">클릭 → 케이스에서 완료 처리</span>
        </div>
        <div class="filter-bar">
          <input type="text" id="fupSearch" placeholder="환자명 / 케이스 ID" oninput="filterFollowups()">
          <select id="fupStageFilter" onchange="filterFollowups()">
            <option value="">전체 단계</option>
            <option>D7</option><option>D14</option><option>D30</option>
            <option>D90</option><option>D180</option>
          </select>
          <select id="fupDoneFilter" onchange="filterFollowups()">
            <option value="">전체</option>
            <option value="pending">미완료</option>
            <option value="done">완료</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>케이스 / 환자</th>
                <th>단계</th>
                <th>마감일</th>
                <th class="mobile-hide">완료일</th>
                <th class="mobile-hide">환자 상태</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody>
              ${followups.length === 0
                ? `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">🔔</div><h3>추적관찰 없음</h3></div></td></tr>`
                : followups.map(f => {
                  const caseNum = f.case_id ? f.case_id.split('-').pop() : '';
                  const displayName = f.patient_name ? `${f.patient_name}-${caseNum}` : f.case_id;
                  const isOver = f.due_date && !f.completed_date && new Date(f.due_date) < today;
                  const isDone = !!f.completed_date;
                  return `
                    <tr class="fup-row clickable-row"
                        data-caseid="${f.case_id}" data-name="${(f.patient_name||'').toLowerCase()}"
                        data-stage="${f.followup_stage}" data-done="${isDone ? 'done' : 'pending'}"
                        onclick="loadPage('caseDetail',{caseId:'${f.case_id}',_section:'followup'})"
                        style="cursor:pointer;${isOver ? 'background:#fff8f0' : isDone ? 'opacity:.65' : ''}">
                      <td>
                        <div style="font-weight:600">${displayName}</div>
                        <div style="font-size:11px;color:var(--gray-500)">${f.case_id}</div>
                      </td>
                      <td><strong>${f.followup_stage}</strong></td>
                      <td style="${isOver ? 'color:var(--danger);font-weight:700' : ''}">${fmtDate(f.due_date)}</td>
                      <td class="mobile-hide">${f.completed_date ? fmtDate(f.completed_date) : '-'}</td>
                      <td class="mobile-hide" style="font-size:12px">${f.patient_response || '-'}</td>
                      <td>
                        ${isDone
                          ? '<span class="badge badge-green">✓ 완료</span>'
                          : isOver
                          ? '<span class="badge badge-red">기한 초과</span>'
                          : '<span class="badge badge-blue">예정</span>'}
                      </td>
                    </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

function filterFollowups() {
  const search = document.getElementById('fupSearch').value.toLowerCase();
  const stage  = document.getElementById('fupStageFilter').value;
  const done   = document.getElementById('fupDoneFilter').value;
  document.querySelectorAll('.fup-row').forEach(row => {
    const id = (row.dataset.caseid + ' ' + row.dataset.name).toLowerCase();
    const ok = (!search || id.includes(search)) &&
               (!stage  || row.dataset.stage === stage) &&
               (!done   || row.dataset.done  === done);
    row.style.display = ok ? '' : 'none';
  });
}
</script>
