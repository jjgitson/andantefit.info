<script>
var CAL_ALL_IDS = [
  'c_a29000156dff2754c933b86d976291438560c4f6a61ad4e9328ea5a8c7e69145@group.calendar.google.com',
  'c_505ada4a196a311925bcbdcd311945bae858274d9d16ed52720d6d67ef948b08@group.calendar.google.com',
  'c_e91e7e0aae5c63485a35b170faa98c5b983e1ec86757380e14c123e2568fe8e5@group.calendar.google.com',
  'c_eba03c032236dfa1734d6961ac21de666f1cc4631c6f23e6921fe238d91c96cf@group.calendar.google.com',
];

var CAL_TABS = [
  {
    id: 'mso',
    label: 'MSO 전체',
    src: null, // 4개 캘린더 모두 표시
  },
  {
    id: 'hospital',
    label: '병원',
    src: 'c_505ada4a196a311925bcbdcd311945bae858274d9d16ed52720d6d67ef948b08@group.calendar.google.com',
  },
  {
    id: 'supplier',
    label: '공급/물류',
    src: 'c_e91e7e0aae5c63485a35b170faa98c5b983e1ec86757380e14c123e2568fe8e5@group.calendar.google.com',
  },
  {
    id: 'billing',
    label: '결제 마감',
    src: 'c_eba03c032236dfa1734d6961ac21de666f1cc4631c6f23e6921fe238d91c96cf@group.calendar.google.com',
  },
];

function getScheduleHTML(params) {
  var tabs = CAL_TABS.map((t, i) =>
    `<div class="tab ${i===0?'active':''}" onclick="switchCalTab(this,'cal-${t.id}')">${t.label}</div>`
  ).join('');

  var panes = CAL_TABS.map((t, i) => {
    var srcParams = t.src
      ? '?src=' + encodeURIComponent(t.src)
      : '?' + CAL_ALL_IDS.map(id => 'src=' + encodeURIComponent(id)).join('&');
    var url = 'https://calendar.google.com/calendar/embed'
      + srcParams
      + '&ctz=Asia%2FSeoul&hl=ko&mode=MONTH'
      + '&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0';
    return `
      <div class="tab-content ${i===0?'active':''}" id="cal-${t.id}">
        <iframe src="${url}"
          style="border:0;width:100%;height:calc(100vh - 220px);min-height:520px;border-radius:var(--radius)"
          frameborder="0" scrolling="no" allowfullscreen></iframe>
      </div>
    `;
  }).join('');

  var html = `
    <div class="tabs">${tabs}</div>
    ${panes}
  `;
  showContent(html);
}

function switchCalTab(el, paneId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(paneId).classList.add('active');
}
</script>
