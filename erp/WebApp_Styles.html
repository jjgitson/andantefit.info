<style>
/* ─── 리셋 & 기본 ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:       #1a73e8;
  --primary-dark:  #1557b0;
  --primary-light: #e8f0fe;
  --success:       #34a853;
  --warning:       #fbbc04;
  --danger:        #ea4335;
  --gray-50:  #f8f9fa;
  --gray-100: #f1f3f4;
  --gray-200: #e8eaed;
  --gray-400: #bdc1c6;
  --gray-500: #9aa0a6;
  --gray-600: #80868b;
  --gray-700: #5f6368;
  --gray-800: #3c4043;
  --gray-900: #202124;
  --sidebar-w: 240px;
  --topbar-h:  56px;
  --radius:    8px;
  --radius-lg: 14px;
  --shadow:    0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  --shadow-md: 0 4px 8px rgba(0,0,0,.12);
  --shadow-lg: 0 10px 28px rgba(0,0,0,.14);
  --t: .15s ease;
}
body {
  font-family: 'Google Sans', 'Noto Sans KR', Arial, sans-serif;
  background: var(--gray-50); color: var(--gray-900);
  font-size: 14px; line-height: 1.5; overflow-x: hidden;
}
a { color: var(--primary); text-decoration: none; }
::placeholder { color: var(--gray-400); opacity: 1; }

/* ─── 스크롤바 ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-500); }

/* ─── 레이아웃 ───────────────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0;
  width: var(--sidebar-w); height: 100vh;
  background: #fff; border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column; z-index: 100;
  transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s;
}
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: 1px solid var(--gray-200);
}
.logo { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -.3px; }
.sidebar-close {
  display: none; background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--gray-700); padding: 4px 6px; line-height: 1;
  border-radius: var(--radius); transition: background var(--t);
}
.sidebar-close:hover { background: var(--gray-100); }

.user-info {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-bottom: 1px solid var(--gray-200);
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; flex-shrink: 0;
}
.user-name { font-weight: 600; font-size: 13px; line-height: 1.3; }
.user-role { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

.nav-menu { list-style: none; padding: 8px 0; flex: 1; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 16px;
  cursor: pointer; border-radius: var(--radius); margin: 2px 8px;
  transition: background var(--t); color: var(--gray-700); font-size: 14px;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.nav-item:hover { background: var(--gray-100); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }

.main-wrapper {
  margin-left: var(--sidebar-w); min-height: 100vh;
  display: flex; flex-direction: column;
}
.top-bar {
  position: sticky; top: 0; height: var(--topbar-h);
  background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 12px; padding: 0 20px; z-index: 50;
}
.menu-btn {
  display: none; background: none; border: none; cursor: pointer;
  font-size: 22px; color: var(--gray-700); padding: 6px;
  border-radius: var(--radius); -webkit-tap-highlight-color: transparent;
  transition: background var(--t);
}
.menu-btn:hover { background: var(--gray-100); }
.page-title { font-size: 17px; font-weight: 600; flex: 1; }
.content { padding: 20px; flex: 1; }
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 99; backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
}
.overlay.show { display: block; }

/* ─── 카드 ───────────────────────────────────────────────── */
.card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid var(--gray-100);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-body { padding: 20px; }

/* ─── 통계 그리드 ─────────────────────────────────────────── */
.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: #fff; border-radius: var(--radius); padding: 16px 20px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: box-shadow var(--t), transform var(--t);
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.stat-number { font-size: 30px; font-weight: 700; line-height: 1; letter-spacing: -.5px; }
.stat-label { font-size: 12px; color: var(--gray-600); margin-top: 4px; }
.stat-card.primary .stat-number { color: var(--primary); }
.stat-card.success .stat-number { color: var(--success); }
.stat-card.warning .stat-number { color: #f59e0b; }
.stat-card.danger  .stat-number { color: var(--danger); }
.stat-card.orange  .stat-number { color: #ea8600; }

/* ─── 테이블 ─────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--gray-50); color: var(--gray-600);
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; padding: 10px 12px; text-align: left;
  border-bottom: 2px solid var(--gray-200); white-space: nowrap;
}
td {
  padding: 11px 12px; border-bottom: 1px solid var(--gray-100);
  vertical-align: middle; font-size: 13px;
}
tr:hover td { background: #f8faff; }
tr:last-child td { border-bottom: none; }
.clickable-row { cursor: pointer; }

/* ─── 폼 ─────────────────────────────────────────────────── */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
input, select, textarea {
  border: 1.5px solid var(--gray-200); border-radius: var(--radius);
  padding: 9px 12px; font-size: 14px; width: 100%; color: var(--gray-900);
  background: #fff; font-family: inherit; line-height: 1.4;
  transition: border-color var(--t), box-shadow var(--t);
}
input:hover:not(:focus):not(:disabled),
select:hover:not(:focus):not(:disabled),
textarea:hover:not(:focus):not(:disabled) { border-color: var(--gray-400); }
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26,115,232,.15);
}
input:disabled, select:disabled, textarea:disabled {
  background: var(--gray-50); color: var(--gray-600); cursor: not-allowed;
}
textarea { resize: vertical; min-height: 80px; }
.required::after { content: ' *'; color: var(--danger); }

/* 폼 헬퍼 */
.form-hint { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.field-error { color: var(--danger); font-size: 11px; margin-top: 2px; display: block; }
.input-error {
  border-color: var(--danger) !important;
  box-shadow: 0 0 0 3px rgba(234,67,53,.12) !important;
}
.form-section { border-top: 1px solid var(--gray-100); margin-top: 20px; padding-top: 16px; }
.form-section-title {
  font-size: 11px; font-weight: 700; color: var(--gray-600);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px;
}

/* ─── 버튼 ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
  font-size: 14px; font-weight: 500; white-space: nowrap;
  font-family: inherit; line-height: 1;
  transition: background var(--t), opacity var(--t), transform var(--t);
}
.btn:active:not(:disabled) { transform: scale(.97); }
.btn-primary  { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled)   { background: var(--primary-dark); }
.btn-secondary {
  background: var(--gray-100); color: var(--gray-900);
  border: 1.5px solid var(--gray-200);
}
.btn-secondary:hover:not(:disabled) { background: var(--gray-200); }
.btn-success  { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled)   { background: #2d9248; }
.btn-danger   { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled)    { opacity: .88; }
.btn-sm  { padding: 5px 12px; font-size: 12px; }
.btn-icon{ padding: 6px 8px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn:disabled, .btn.is-loading {
  opacity: .6; cursor: not-allowed; pointer-events: none;
}

/* 버튼 스피너 */
.btn-spinner {
  display: inline-block; width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite;
}
.btn-secondary .btn-spinner {
  border-color: rgba(0,0,0,.15); border-top-color: var(--gray-700);
}

/* ─── 뱃지 ───────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap; line-height: 1.4;
}
.badge-blue   { background: #e8f0fe; color: #1a73e8; }
.badge-green  { background: #e6f4ea; color: #1e8e3e; }
.badge-orange { background: #fce8b2; color: #b06000; }
.badge-red    { background: #fce8e6; color: #c5221f; }
.badge-gray   { background: var(--gray-100); color: var(--gray-700); }
.badge-yellow { background: #fff8e1; color: #b06000; }
.badge-purple { background: #f3e8fd; color: #7627bb; }
.badge-teal   { background: #e6f7f5; color: #0d7c6a; }

/* ─── 알림 ───────────────────────────────────────────────── */
@keyframes alertIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(.96); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0)      scale(1);  }
}
#alertBox {
  position: fixed; top: 68px; left: 50%; transform: translateX(-50%);
  min-width: 280px; max-width: 520px; z-index: 400;
  box-shadow: var(--shadow-md); border-radius: var(--radius);
  animation: alertIn .2s ease both;
}
.alert {
  padding: 12px 20px; margin: 0; border-radius: var(--radius);
  font-size: 14px; font-weight: 500; border-left: 4px solid; line-height: 1.5;
}
.alert-success { background: #e6f4ea; color: #1e8e3e; border-color: var(--success); }
.alert-error   { background: #fce8e6; color: #c5221f; border-color: var(--danger); }
.alert-info    { background: #e8f0fe; color: #1a73e8; border-color: var(--primary); }
.alert-warning { background: #fff8e1; color: #b06000; border-color: var(--warning); }

/* ─── 모달 ───────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal {
  background: #fff; border-radius: var(--radius-lg); width: 100%;
  max-width: 600px; max-height: 92vh;
  display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
}
.modal-lg { max-width: 880px; }
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--gray-100);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close {
  background: none; border: none; cursor: pointer; font-size: 20px;
  color: var(--gray-500); width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius); transition: background var(--t), color var(--t);
}
.modal-close:hover { background: var(--gray-100); color: var(--gray-900); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 20px; border-top: 1px solid var(--gray-100);
  display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0;
}

/* ─── 탭 ─────────────────────────────────────────────────── */
.tabs {
  display: flex; border-bottom: 2px solid var(--gray-200);
  margin-bottom: 16px; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--gray-600); border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: color var(--t), background var(--t);
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: var(--primary); background: var(--gray-50); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ─── 로딩 ───────────────────────────────────────────────── */
.loading-spinner {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; gap: 14px; color: var(--gray-600);
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--gray-200);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── 빈 상태 ────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--gray-500); }
.empty-state-icon { font-size: 44px; margin-bottom: 12px; line-height: 1; }
.empty-state h3 { font-size: 15px; color: var(--gray-700); margin-bottom: 6px; font-weight: 600; }
.empty-state p { font-size: 13px; }

/* ─── 필터 바 ────────────────────────────────────────────── */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  padding: 12px 16px; background: var(--gray-50); border-bottom: 1px solid var(--gray-100);
}
.filter-bar input, .filter-bar select { max-width: 200px; }

/* ─── 디테일 그리드 ───────────────────────────────────────── */
.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px 24px;
}
.detail-item label {
  font-size: 11px; font-weight: 700; color: var(--gray-600);
  text-transform: uppercase; letter-spacing: .5px;
}
.detail-item .value { margin-top: 3px; font-size: 14px; }

/* ─── 타임라인 ───────────────────────────────────────────── */
.timeline { position: relative; padding-left: 24px; }
.timeline::before {
  content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
  width: 2px; background: var(--gray-200);
}
.timeline-item { position: relative; margin-bottom: 16px; }
.timeline-dot {
  position: absolute; left: -20px; top: 4px; width: 10px; height: 10px;
  border-radius: 50%; background: var(--primary);
  border: 2px solid #fff; box-shadow: 0 0 0 2px var(--primary);
}
.timeline-date    { font-size: 11px; color: var(--gray-500); }
.timeline-content { font-size: 13px; }

/* ─── 모바일 하단 네비게이션 ──────────────────────────────── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 58px; background: #fff; border-top: 1px solid var(--gray-200);
  z-index: 100; justify-content: space-around; align-items: stretch;
  padding: 0 4px;
}
.bn-item {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; flex: 1; cursor: pointer;
  color: var(--gray-500); font-size: 10px; font-weight: 500;
  padding: 6px 4px; border-radius: var(--radius);
  transition: color var(--t); -webkit-tap-highlight-color: transparent;
}
.bn-item.active { color: var(--primary); }
.bn-item.active .bn-icon { transform: scale(1.12); }
.bn-icon { font-size: 21px; line-height: 1; transition: transform var(--t); }

/* ─── 유틸리티 ───────────────────────────────────────────── */
.divider   { border: none; border-top: 1px solid var(--gray-100); margin: 16px 0; }
.text-muted  { color: var(--gray-500); }
.text-danger { color: var(--danger); }
.text-success{ color: var(--success); }
.fw-600      { font-weight: 600; }
/* 모바일에서 테이블 열 숨김 */
.mobile-hide { display: table-cell; }

/* ─── 반응형: 768px ──────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); box-shadow: none; }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .sidebar-close { display: block; }
  .main-wrapper { margin-left: 0; padding-bottom: 58px; }
  .menu-btn { display: flex; }
  .content  { padding: 12px; }

  /* 통계 카드 2열 */
  .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }

  /* 폼 1열 */
  .form-grid { grid-template-columns: 1fr; }

  /* 필터바: 가로 스크롤 */
  .filter-bar {
    flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none;
    padding: 10px 12px;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-bar input, .filter-bar select {
    max-width: none; min-width: 140px; flex-shrink: 0;
  }

  /* 모바일 하단 탭바 */
  .bottom-nav { display: flex; }

  /* iOS 키보드 줌 방지: font-size 16px */
  input, select, textarea { font-size: 16px !important; }

  /* 터치 타겟 확보 */
  .btn       { min-height: 40px; }
  .nav-item  { min-height: 48px; }
  .tab       { padding: 12px 14px; }

  /* 모달: 하단 시트 */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal {
    max-width: 100%; max-height: 95vh;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .modal-body { padding: 16px; }

  /* 덜 중요한 테이블 컬럼 숨김 */
  .mobile-hide { display: none !important; }

  /* 카드 헤더 */
  .card-header { gap: 8px; }
}

/* ─── 반응형: 480px ──────────────────────────────────────── */
@media (max-width: 480px) {
  .content { padding: 8px; }
  .card-body { padding: 14px; }
  .card-header { padding: 12px 14px; }
  .stat-number { font-size: 26px; }
  .filter-bar  { padding: 8px 10px; }
  .modal-body  { padding: 14px; }
}

/* ─── 반응형: 1200px+ ───────────────────────────────────── */
@media (min-width: 1200px) {
  .stat-grid { grid-template-columns: repeat(7, 1fr); }
}

/* ─── iPhone safe area (노치/홈 인디케이터) ─────────────── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav {
    padding-bottom: env(safe-area-inset-bottom);
    height: calc(58px + env(safe-area-inset-bottom));
  }
  @media (max-width: 768px) {
    .main-wrapper { padding-bottom: calc(58px + env(safe-area-inset-bottom)); }
  }
}
</style>
