<script>
// ─── 공급 관리 화면 ────────────────────────────────────────────
function getSupplierHTML(params) {
  showLoading(true);
  callServer('supplier.order.list', params || {}).then(data => {
    const orders = data.orders || [];
    const today = new Date();
    const isSupplier = APP.role === 'Supplier User';
    const canCreate = ['MSO Admin','MSO Coordinator'].includes(APP.role);

    const delayed = orders.filter(o =>
      ['Requested','Confirmed'].includes(o.supplier_status) &&
      o.expected_ship_date && new Date(o.expected_ship_date) < today
    ).length;

    const html = `
      ${delayed > 0 ? `<div class="alert alert-warning">⚠️ 납기 지연 주문 ${delayed}건이 있습니다</div>` : ''}

      <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
        <div class="stat-card primary"><div class="stat-number">${orders.length}</div><div class="stat-label">전체 주문</div></div>
        <div class="stat-card warning"><div class="stat-number">${delayed}</div><div class="stat-label">납기 지연</div></div>
        <div class="stat-card orange"><div class="stat-number">${orders.filter(o=>o.supplier_status==='In Transit').length}</div><div class="stat-label">배송 중</div></div>
        <div class="stat-card success"><div class="stat-number">${orders.filter(o=>o.acceptance_check_status==='Accepted').length}</div><div class="stat-label">검수 완료</div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">공급 주문 목록</span>
        </div>
        <div class="filter-bar">
          <input type="text" id="orderSearch" placeholder="케이스 ID / 주문 ID" oninput="filterOrders()">
          <select id="orderStatusFilter" onchange="filterOrders()">
            <option value="">전체 상태</option>
            <option>Not Requested</option><option>Requested</option>
            <option>Confirmed</option><option>In Transit</option>
            <option>Delivered</option><option>Closed</option>
          </select>
          <select id="acceptanceFilter" onchange="filterOrders()">
            <option value="">검수 전체</option>
            <option>Not Started</option><option>Pending</option>
            <option>Accepted</option><option>Rejected</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>주문 ID</th>
                <th>케이스</th>
                ${!isSupplier ? '<th>공급업체</th>' : ''}
                <th>요청 품목</th>
                <th>예정 출고</th>
                <th>배치번호</th>
                <th>공급 상태</th>
                <th>검수 상태</th>
                <th>콜드체인</th>
                <th>액션</th>
              </tr>
            </thead>
            <tbody id="ordersTbody">
              ${renderOrderRows_(orders, isSupplier)}
            </tbody>
          </table>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

function renderOrderRows_(orders, isSupplier) {
  const today = new Date();
  if (!orders.length) return `<tr><td colspan="10"><div class="empty-state"><div class="empty-state-icon">🏭</div><h3>주문 없음</h3></div></td></tr>`;

  return orders.map(o => {
    const isDelayed = ['Requested','Confirmed'].includes(o.supplier_status) &&
      o.expected_ship_date && new Date(o.expected_ship_date) < today;
    const canShip = ['MSO Admin','Supplier User'].includes(APP.role) && o.supplier_status === 'Requested';
    const canAccept = ['MSO Admin','Hospital User'].includes(APP.role) && o.supplier_status === 'Delivered';
    const incidentBadge = (o.transport_incident_flag === true || o.transport_incident_flag === 'TRUE')
      ? '<span class="badge badge-red">이상</span>' : '';

    return `
      <tr class="order-row" data-id="${o.supplier_order_id}" data-caseid="${o.case_id}"
          data-status="${o.supplier_status}" data-acceptance="${o.acceptance_check_status}"
          style="${isDelayed ? 'background:#fff8e1' : ''}">
        <td><code>${o.supplier_order_id}</code></td>
        <td><a href="#" onclick="loadPage('caseDetail',{caseId:'${o.case_id}'})">${o.case_id}</a></td>
        ${!isSupplier ? `<td>${o.supplier_id||'-'}</td>` : ''}
        <td>${o.requested_item||'-'}</td>
        <td style="${isDelayed ? 'color:var(--danger);font-weight:700' : ''}">${fmtDate(o.expected_ship_date)}</td>
        <td>${o.lot_batch_no || '<span style="color:var(--gray-500)">미입력</span>'}</td>
        <td>${statusBadge(o.supplier_status)}</td>
        <td>${statusBadge(o.acceptance_check_status)} ${o.acceptance_check_status==='Rejected'?'🔴':''}</td>
        <td>
          ${incidentBadge}
          ${o.coa_link ? `<a class="btn btn-sm btn-secondary" href="${o.coa_link}" target="_blank">COA</a>` : ''}
          ${o.temp_log_link ? `<a class="btn btn-sm btn-secondary" href="${o.temp_log_link}" target="_blank">온도</a>` : ''}
          ${o.shipment_tracking_no ? `<span style="font-size:11px">${o.shipment_tracking_no}</span>` : ''}
        </td>
        <td>
          ${canShip ? `<button class="btn btn-sm btn-primary" onclick="showShipModal('${o.supplier_order_id}','${(o.expected_ship_date||'').toString().substring(0,10)}','${(o.lot_batch_no||'')}')">출고확정</button>` : ''}
          ${canAccept ? `<button class="btn btn-sm btn-success" onclick="showAcceptModal('${o.supplier_order_id}')">검수</button>` : ''}
          ${o.supplier_status === 'In Transit' && APP.role !== 'Supplier User' ? `<button class="btn btn-sm btn-secondary" onclick="showIncidentModal('${o.supplier_order_id}')">이상신고</button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

function filterOrders() {
  const search = document.getElementById('orderSearch').value.toLowerCase();
  const status = document.getElementById('orderStatusFilter').value;
  const acceptance = document.getElementById('acceptanceFilter').value;
  document.querySelectorAll('.order-row').forEach(row => {
    const id = (row.dataset.id + row.dataset.caseid).toLowerCase();
    const ok = (!search || id.includes(search)) &&
               (!status || row.dataset.status === status) &&
               (!acceptance || row.dataset.acceptance === acceptance);
    row.style.display = ok ? '' : 'none';
  });
}

// ─── 출고 확정 모달 ─────────────────────────────────────────
function showShipModal(orderId, defaultDate, defaultLot) {
  const body = `
    <div class="form-grid">
      <div class="form-group full"><label class="required">확정 출고일</label><input type="date" id="shipDate" required value="${defaultDate || ''}"></div>
      <div class="form-group"><label>배치번호 (LOT)</label><input type="text" id="lotNo" placeholder="LOT-2026-042" value="${defaultLot || ''}"></div>
      <div class="form-group"><label>운송장 번호</label><input type="text" id="trackNo" placeholder="FedEx-XXXX"></div>
      <div class="form-group full"><label>COA 파일 Drive 링크</label><input type="url" id="coaLink" placeholder="https://drive.google.com/..."></div>
      <div class="form-group"><label>보관 조건</label><input type="text" id="storeCond" placeholder="2-8°C"></div>
      <div class="form-group"><label>온도 로그 링크</label><input type="url" id="tempLink" placeholder="https://drive.google.com/..."></div>
    </div>
  `;
  showModal('출고 확정 입력', body, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitShipment('${orderId}')">출고 확정</button>
  `);
}

function submitShipment(orderId) {
  const date = document.getElementById('shipDate').value;
  if (!date) { showAlert('확정 출고일은 필수입니다', 'warning'); return; }

  callServer('supplier.shipment.confirm', {
    orderId, confirmedShipDate: date, lotBatchNo: lot,
    trackingNo: document.getElementById('trackNo').value,
    coaLink: document.getElementById('coaLink').value,
    storageCondition: document.getElementById('storeCond').value,
    tempLogLink: document.getElementById('tempLink').value,
  }).then(() => { closeModal(); showAlert('출고 확정 완료', 'success'); loadPage('supplier'); })
    .catch(err => showAlert(err.message, 'error'));
}

// ─── 입고 검수 모달 ─────────────────────────────────────────
function showAcceptModal(orderId) {
  const body = `
    <div class="form-grid">
      <div class="form-group full">
        <label class="required">검수 결과</label>
        <select id="accResult" required>
          <option value="">선택</option>
          <option value="Accepted">✅ Accepted - 입고 승인</option>
          <option value="Rejected">❌ Rejected - 반려</option>
        </select>
      </div>
      <div class="form-group full"><label>검수 메모</label><textarea id="accNotes" placeholder="이상 없음 / 반려 사유 등"></textarea></div>
    </div>
    <p style="margin-top:12px;font-size:12px;color:var(--gray-700)">⚕️ 입고 검수는 병원 의료 책임자가 직접 수행해야 합니다.</p>
  `;
  showModal('입고 검수', body, `
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="submitAcceptance('${orderId}')">검수 결과 저장</button>
  `);
}

function submitAcceptance(orderId) {
  const result = document.getElementById('accResult').value;
  if (!result) { showAlert('검수 결과를 선택하세요', 'warning'); return; }
  callServer('supplier.acceptance.record', { orderId, result, notes: document.getElementById('accNotes').value })
    .then(() => { closeModal(); showAlert('검수 결과 저장 완료', 'success'); loadPage('supplier'); })
    .catch(err => showAlert(err.message, 'error'));
}

// ─── 운송 이상 신고 모달 ─────────────────────────────────────
function showIncidentModal(orderId) {
  showAlert('이상 신고 기능은 담당 코디에게 즉시 연락 후 케이스 상세에서 처리하세요', 'warning');
}
</script>
