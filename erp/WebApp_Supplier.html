<script>
// ─── 공급 관리 (읽기 전용 대시보드) ───────────────────────────
function getSupplierHTML(params) {
  showLoading(true);
  callServer('supplier.order.list', params || {}).then(data => {
    const orders = data.orders || [];
    const today  = new Date();

    const inTransit = orders.filter(o => o.supplier_status === 'In Transit').length;
    const delayed   = orders.filter(o =>
      o.supplier_status === 'In Transit' &&
      o.expected_ship_date && new Date(o.expected_ship_date) < today
    ).length;
    const delivered = orders.filter(o => o.supplier_status === 'Delivered').length;

    const html = `
      ${delayed > 0 ? `<div class="alert alert-warning">⚠️ 배송 예정일 초과 ${delayed}건 — 케이스를 클릭하여 확인하세요</div>` : ''}

      <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
        <div class="stat-card primary"><div class="stat-number">${orders.length}</div><div class="stat-label">전체 주문</div></div>
        <div class="stat-card warning"><div class="stat-number">${inTransit}</div><div class="stat-label">배송 중</div></div>
        <div class="stat-card ${delayed>0?'danger':'success'}"><div class="stat-number">${delayed}</div><div class="stat-label">예정일 초과</div></div>
        <div class="stat-card success"><div class="stat-number">${delivered}</div><div class="stat-label">출고 확정</div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">공급 주문 현황</span>
          <span style="font-size:12px;color:var(--gray-500)">항목 클릭 → 케이스 상세에서 처리</span>
        </div>
        <div class="filter-bar">
          <input type="text" id="orderSearch" placeholder="환자명 / 케이스 ID" oninput="filterOrders()">
          <select id="orderStatusFilter" onchange="filterOrders()">
            <option value="">전체 상태</option>
            <option value="In Transit">배송 중</option>
            <option value="Delivered">출고 확정</option>
            <option value="Closed">종료</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>케이스 / 환자</th>
                <th class="mobile-hide">요청 품목</th>
                <th>배송 예정일</th>
                <th>상태</th>
                <th class="mobile-hide">출고 확정일</th>
              </tr>
            </thead>
            <tbody id="ordersTbody">
              ${renderSupplierRows_(orders, today)}
            </tbody>
          </table>
        </div>
      </div>
    `;
    showContent(html);
  }).catch(err => showContent(`<div class="alert alert-error">${err.message}</div>`));
}

function renderSupplierRows_(orders, today) {
  if (!orders.length) return `
    <tr><td colspan="5">
      <div class="empty-state"><div class="empty-state-icon">🏭</div><h3>주문 없음</h3></div>
    </td></tr>`;

  return orders.map(o => {
    const caseNum = o.case_id ? o.case_id.split('-').pop() : '';
    const displayName = o.patient_name ? `${o.patient_name}-${caseNum}` : o.case_id;
    const isDelayed = o.supplier_status === 'In Transit' &&
      o.expected_ship_date && new Date(o.expected_ship_date) < today;
    return `
      <tr class="order-row clickable-row"
          data-id="${o.supplier_order_id}" data-caseid="${o.case_id}"
          data-name="${(o.patient_name||'').toLowerCase()}" data-status="${o.supplier_status}"
          onclick="loadPage('caseDetail',{caseId:'${o.case_id}',_section:'orders'})"
          style="cursor:pointer;${isDelayed ? 'background:#fff8e1' : ''}">
        <td>
          <div style="font-weight:600">${displayName}</div>
          <div style="font-size:11px;color:var(--gray-500)">${o.case_id} · ${o.supplier_order_id}</div>
        </td>
        <td class="mobile-hide">${o.requested_item || '-'}</td>
        <td style="${isDelayed ? 'color:var(--danger);font-weight:700' : ''}">
          ${fmtDate(o.expected_ship_date)}
          ${isDelayed ? '<span class="badge badge-red" style="margin-left:4px">초과</span>' : ''}
        </td>
        <td>${statusBadge(o.supplier_status)}</td>
        <td class="mobile-hide">${o.delivery_date ? fmtDate(o.delivery_date) : '-'}</td>
      </tr>
    `;
  }).join('');
}

function filterOrders() {
  const search = document.getElementById('orderSearch').value.toLowerCase();
  const status = document.getElementById('orderStatusFilter').value;
  document.querySelectorAll('.order-row').forEach(row => {
    const id = (row.dataset.caseid + ' ' + row.dataset.name).toLowerCase();
    const ok = (!search || id.includes(search)) &&
               (!status || row.dataset.status === status);
    row.style.display = ok ? '' : 'none';
  });
}
</script>
