<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSO-ERP</title>
  <?!= include_('WebApp_Styles'); ?>
</head>
<body>

<!-- 네비게이션 사이드바 -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1 class="logo">MSO-ERP</h1>
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  </div>
  <div class="user-info">
    <div class="user-avatar"><?= userName.charAt(0).toUpperCase() ?></div>
    <div>
      <div class="user-name"><?= userName ?></div>
      <div class="user-role badge-<?= userRole.toLowerCase().replace(/\s/g, '-') ?>"><?= userRole ?></div>
    </div>
  </div>
  <ul class="nav-menu">
    <li class="nav-item <?= page==='dashboard'?'active':'' ?>" onclick="loadPage('dashboard')">
      <span class="nav-icon">📊</span><span>대시보드</span>
    </li>
    <li class="nav-item <?= page==='leads'?'active':'' ?>" onclick="loadPage('leads')" id="nav-leads">
      <span class="nav-icon">📋</span><span>리드 관리</span>
    </li>
    <li class="nav-item <?= page==='cases'?'active':'' ?>" onclick="loadPage('cases')">
      <span class="nav-icon">🗂️</span><span>케이스</span>
    </li>
    <li class="nav-item" onclick="loadPage('supplier')" id="nav-supplier">
      <span class="nav-icon">🏭</span><span>공급 관리</span>
    </li>
    <li class="nav-item" onclick="loadPage('billing')" id="nav-billing">
      <span class="nav-icon">💳</span><span>결제/청구</span>
    </li>
    <li class="nav-item" onclick="loadPage('followup')">
      <span class="nav-icon">🔔</span><span>추적관리</span>
    </li>
  </ul>
</nav>

<!-- 오버레이 (모바일) -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- 메인 컨텐츠 -->
<div class="main-wrapper">
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h2 class="page-title" id="pageTitle">대시보드</h2>
    <div class="header-actions">
      <button class="btn btn-sm btn-primary" id="headerActionBtn" style="display:none"></button>
    </div>
  </header>

  <!-- 알림 영역 -->
  <div id="alertBox" class="alert" style="display:none"></div>

  <!-- 페이지 컨텐츠 -->
  <main class="content" id="mainContent">
    <!-- 초기 로딩 상태: JS가 로드되면 loadPage()가 대체함 -->
  </main>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ─── 전역 상태 ─────────────────────────────────────────────────
const APP = {
  user:         '<?= userEmail ?>',
  role:         '<?= userRole ?>',
  name:         '<?= userName ?>',
  currentPage:  '<?= page ?>',
  sessionNonce: '<?= sessionNonce ?>',  // handleClientRequest 인증에 사용
};

// 역할별 메뉴 가시성
(function initNav() {
  const role = APP.role;
  if (role === 'Supplier User') {
    document.getElementById('nav-leads').style.display = 'none';
    document.getElementById('nav-billing').style.display = 'none';
  }
  if (role === 'Hospital User') {
    document.getElementById('nav-billing').style.display = 'none';
  }
  if (role === 'Finance User') {
    document.getElementById('nav-supplier').style.display = 'none';
  }
})();

// ─── 페이지 라우터 ─────────────────────────────────────────────
// PAGE_TEMPLATES는 window.load 이후에 초기화해야 함:
// 각 페이지 함수들은 별도 <script> 블록에 있으므로
// 이 블록이 실행되는 시점에는 아직 정의되지 않은 상태임.
// loadPage()는 window[fnName]()으로 런타임에 함수를 조회함.
const PAGE_FN_MAP = {
  dashboard:  'getDashboardHTML',
  leads:      'getLeadsHTML',
  cases:      'getCasesHTML',
  caseDetail: 'getCaseDetailHTML',
  supplier:   'getSupplierHTML',
  billing:    'getBillingHTML',
  followup:   'getFollowupHTML',
  calendar:   'getCalendarHTML',
};

const PAGE_TITLES = {
  dashboard:  '대시보드',
  leads:      '리드 관리',
  cases:      '케이스 목록',
  caseDetail: '케이스 상세',
  supplier:   '공급 관리',
  billing:    '결제/청구',
  followup:   '추적관리',
  calendar:   '일정',
};

function loadPage(page, params) {
  APP.currentPage  = page;
  APP.currentParams = params || {};
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  showLoading(true);

  const fnName = PAGE_FN_MAP[page];
  const renderFn = fnName ? window[fnName] : null;

  if (typeof renderFn === 'function') {
    try {
      renderFn(params);
    } catch (err) {
      showContent(`<div class="alert alert-error">페이지 렌더링 오류: ${err.message}</div>`);
    }
  } else {
    showContent(`<div class="alert alert-warning">준비 중인 페이지입니다: ${page}</div>`);
  }

  if (window.innerWidth <= 768) toggleSidebar(false);
}

function showContent(html) {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-spinner" id="loadingSpinner" style="display:none"><div class="spinner"></div><p>로딩 중...</p></div>' +
    html;
}

function showLoading(show) {
  const content = document.getElementById('mainContent');
  if (show) {
    content.innerHTML =
      '<div class="loading-spinner" id="loadingSpinner" style="display:flex">' +
      '<div class="spinner"></div><p>로딩 중...</p></div>';
  }
}

// ─── API 통신 ──────────────────────────────────────────────────
/**
 * 서버 handleClientRequest 호출.
 * - APP.sessionNonce가 있으면 data.__nonce 에 포함 (GSI / _ownerBypass 세션)
 * - 서버 응답이 {error: ...} 이면 Promise.reject
 */
function callServer(action, data) {
  const payload = Object.assign({}, data || {});
  if (APP.sessionNonce) payload.__nonce = APP.sessionNonce;

  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(function(raw) {
        try {
          const r = (typeof raw === 'string') ? JSON.parse(raw) : raw;
          if (r && r.error) {
            reject(new Error('[' + (r.code || 'ERR') + '] ' + r.error));
          } else {
            resolve(r);
          }
        } catch (e) {
          reject(new Error('응답 파싱 실패: ' + e.message));
        }
      })
      .withFailureHandler(function(err) {
        reject(new Error(err && err.message ? err.message : String(err)));
      })
      .handleClientRequest(action, payload);
  });
}

// ─── 캘린더 페이지 스텁 ───────────────────────────────────────
function getCalendarHTML() {
  showContent(`
    <div class="card">
      <div class="card-header"><span class="card-title">📅 일정</span></div>
      <div class="card-body">
        <p style="color:var(--gray-600);padding:24px 0">캘린더 뷰는 준비 중입니다.<br>
          케이스 상세 화면에서 개별 일정을 관리하세요.</p>
      </div>
    </div>
  `);
}

// ─── UI 헬퍼 ──────────────────────────────────────────────────
function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.className = 'alert alert-' + (type || 'info');
  box.textContent = msg;
  box.style.display = 'block';
  setTimeout(function() { box.style.display = 'none'; }, 4000);
}

function showModal(title, bodyHtml, footerHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml || '';
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

function toggleSidebar(forceOpen) {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const isOpen  = sidebar.classList.contains('open');
  const shouldOpen = (forceOpen !== undefined) ? forceOpen : !isOpen;
  sidebar.classList.toggle('open', shouldOpen);
  overlay.classList.toggle('show', shouldOpen);
}

function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return isNaN(d.getTime()) ? String(iso).split('T')[0] : d.toLocaleDateString('ko-KR');
}

function fmtMoney(amount) {
  const n = Number(amount);
  if (!amount || isNaN(n)) return '-';
  return n.toLocaleString('ko-KR') + '원';
}

function statusBadge(status) {
  const colorMap = {
    'Draft': 'gray', 'Under Hospital Review': 'blue', 'Hospital Approved': 'green',
    'Supplier Coordination': 'orange', 'Shipment In Transit': 'purple',
    'Acceptance Check Pending': 'yellow', 'Acceptance Confirmed': 'teal',
    'Scheduled': 'blue', 'Completed': 'green', 'Follow-up Ongoing': 'orange',
    'Closed': 'gray', 'Cancelled': 'red',
    'New': 'blue', 'Contacted': 'teal', 'Awaiting Documents': 'orange',
    'Ready for Hospital Review': 'green', 'Converted': 'green',
    'Closed - No Progress': 'gray',
    'Pending': 'yellow', 'In Review': 'blue',
    'Suitable': 'green', 'Not Suitable': 'red', 'Deferred': 'orange',
    'Need More Information': 'yellow',
    'Requested': 'blue', 'Confirmed': 'teal', 'In Transit': 'purple',
    'Delivered': 'green',
    'Not Started': 'gray', 'Accepted': 'green', 'Rejected': 'red',
    'Not Issued': 'gray', 'Quote Sent': 'blue', 'Invoice Sent': 'orange',
    'Partially Paid': 'yellow', 'Paid': 'green', 'Refunded': 'teal',
    'MSO Admin': 'red', 'MSO Coordinator': 'blue', 'Hospital User': 'green',
    'Supplier User': 'orange', 'Finance User': 'purple',
  };
  if (!status) return '<span class="badge badge-gray">-</span>';
  const color = colorMap[status] || 'gray';
  return `<span class="badge badge-${color}">${status}</span>`;
}

// ─── 초기 페이지 로드 ─────────────────────────────────────────
// window.load 이후에 실행: 이 시점에는 모든 include 스크립트가 로드됨
window.addEventListener('load', function() {
  loadPage(APP.currentPage);
});
</script>

<?!= include_('WebApp_Leads'); ?>
<?!= include_('WebApp_Cases'); ?>
<?!= include_('WebApp_CaseDetail'); ?>
<?!= include_('WebApp_Supplier'); ?>
<?!= include_('WebApp_Billing'); ?>

</html>
