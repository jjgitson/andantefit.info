<style>
/* ─── 리셋 & 기본 ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --success: #34a853;
  --warning: #fbbc04;
  --danger: #ea4335;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f4;
  --gray-200: #e8eaed;
  --gray-500: #9aa0a6;
  --gray-700: #5f6368;
  --gray-900: #202124;
  --sidebar-w: 240px;
  --topbar-h: 56px;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  --shadow-md: 0 4px 6px rgba(0,0,0,.1);
}
body { font-family: 'Google Sans', 'Noto Sans KR', Arial, sans-serif;
  background: var(--gray-50); color: var(--gray-900); font-size: 14px;
  overflow-x: hidden; }
a { color: var(--primary); text-decoration: none; }

/* ─── 레이아웃 ───────────────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
  background: #fff; border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column; z-index: 100;
  transition: transform .3s;
}
.sidebar-header { display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: 1px solid var(--gray-200); }
.logo { font-size: 18px; font-weight: 700; color: var(--primary); }
.sidebar-close { display: none; background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--gray-700); }

.user-info { display: flex; align-items: center; gap: 10px;
  padding: 16px; border-bottom: 1px solid var(--gray-200); }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; flex-shrink: 0; }
.user-name { font-weight: 600; font-size: 13px; }
.user-role { font-size: 11px; color: var(--gray-700); margin-top: 2px; }

.nav-menu { list-style: none; padding: 8px 0; flex: 1; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  cursor: pointer; border-radius: var(--radius); margin: 2px 8px;
  transition: background .15s; color: var(--gray-700); font-size: 14px; }
.nav-item:hover { background: var(--gray-100); }
.nav-item.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }

.main-wrapper { margin-left: var(--sidebar-w); min-height: 100vh;
  display: flex; flex-direction: column; }
.top-bar { position: sticky; top: 0; height: var(--topbar-h);
  background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 12px; padding: 0 20px; z-index: 50; }
.menu-btn { display: none; background: none; border: none; cursor: pointer;
  font-size: 22px; color: var(--gray-700); padding: 4px 8px; }
.page-title { font-size: 18px; font-weight: 600; flex: 1; }

.content { padding: 20px; flex: 1; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 99; }
.overlay.show { display: block; }

/* ─── 카드 ───────────────────────────────────────────────── */
.card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  margin-bottom: 16px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 15px; font-weight: 600; }
.card-body { padding: 20px; }

/* ─── 통계 그리드 ─────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: var(--radius); padding: 16px;
  box-shadow: var(--shadow); cursor: pointer; transition: box-shadow .15s; }
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-number { font-size: 32px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: var(--gray-700); margin-top: 4px; }
.stat-card.primary .stat-number { color: var(--primary); }
.stat-card.success .stat-number { color: var(--success); }
.stat-card.warning .stat-number { color: #f59e0b; }
.stat-card.danger .stat-number { color: var(--danger); }

/* ─── 테이블 ─────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--gray-50); color: var(--gray-700); font-size: 12px;
  font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
  padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--gray-200); }
td { padding: 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tr:hover td { background: var(--gray-50); }
tr:last-child td { border-bottom: none; }
.clickable-row { cursor: pointer; }

/* ─── 폼 ─────────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
input, select, textarea {
  border: 1px solid var(--gray-200); border-radius: var(--radius);
  padding: 8px 12px; font-size: 14px; width: 100%;
  transition: border-color .15s; background: #fff; font-family: inherit; }
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(26,115,232,.2); }
textarea { resize: vertical; min-height: 80px; }
.required::after { content: ' *'; color: var(--danger); }

/* ─── 버튼 ───────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
  border-radius: var(--radius); border: none; cursor: pointer; font-size: 14px;
  font-weight: 500; transition: all .15s; white-space: nowrap; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--gray-100); color: var(--gray-900);
  border: 1px solid var(--gray-200); }
.btn-secondary:hover { background: var(--gray-200); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn-icon { padding: 6px 8px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ─── 뱃지 ───────────────────────────────────────────────── */
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-blue { background: #e8f0fe; color: #1a73e8; }
.badge-green { background: #e6f4ea; color: #1e8e3e; }
.badge-orange { background: #fce8b2; color: #b06000; }
.badge-red { background: #fce8e6; color: #c5221f; }
.badge-gray { background: var(--gray-100); color: var(--gray-700); }
.badge-yellow { background: #fff8e1; color: #b06000; }
.badge-purple { background: #f3e8fd; color: #7627bb; }
.badge-teal { background: #e6f7f5; color: #0d7c6a; }

/* ─── 알림 ───────────────────────────────────────────────── */
.alert { padding: 12px 20px; margin: 0 20px 12px;
  border-radius: var(--radius); font-size: 14px; border-left: 4px solid; }
.alert-success { background: #e6f4ea; color: #1e8e3e; border-color: var(--success); }
.alert-error { background: #fce8e6; color: #c5221f; border-color: var(--danger); }
.alert-info { background: #e8f0fe; color: #1a73e8; border-color: var(--primary); }
.alert-warning { background: #fff8e1; color: #b06000; border-color: var(--warning); }

/* ─── 모달 ───────────────────────────────────────────────── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: var(--radius); width: 100%;
  max-width: 560px; max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-md); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--gray-700); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--gray-200);
  display: flex; justify-content: flex-end; gap: 8px; }

/* ─── 탭 ─────────────────────────────────────────────────── */
.tabs { display: flex; border-bottom: 2px solid var(--gray-200); margin-bottom: 16px;
  overflow-x: auto; gap: 0; }
.tab { padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--gray-700); border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all .15s; }
.tab:hover { color: var(--primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ─── 로딩 ───────────────────────────────────────────────── */
.loading-spinner { display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px; gap: 16px; color: var(--gray-700); }
.spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── 빈 상태 ────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--gray-500); }
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; color: var(--gray-700); margin-bottom: 6px; }

/* ─── 필터 바 ────────────────────────────────────────────── */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  padding: 12px 20px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
.filter-bar input, .filter-bar select { max-width: 180px; }

/* ─── 디테일 그리드 ───────────────────────────────────────── */
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px 20px; }
.detail-item label { font-size: 11px; font-weight: 600; color: var(--gray-700);
  text-transform: uppercase; letter-spacing: .5px; }
.detail-item .value { margin-top: 2px; font-size: 14px; }

/* ─── 타임라인 ───────────────────────────────────────────── */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
  width: 2px; background: var(--gray-200); }
.timeline-item { position: relative; margin-bottom: 16px; }
.timeline-dot { position: absolute; left: -20px; top: 4px; width: 10px; height: 10px;
  border-radius: 50%; background: var(--primary); border: 2px solid #fff;
  box-shadow: 0 0 0 2px var(--primary); }
.timeline-date { font-size: 11px; color: var(--gray-500); }
.timeline-content { font-size: 13px; }

/* ─── 반응형 ─────────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-close { display: block; }
  .main-wrapper { margin-left: 0; }
  .menu-btn { display: block; }
  .content { padding: 12px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar input, .filter-bar select { max-width: 100%; }
  .modal { max-width: 100%; margin: 0; border-radius: var(--radius) var(--radius) 0 0; }
  .modal-overlay { align-items: flex-end; padding: 0; }
}

@media (min-width: 1200px) {
  .stat-grid { grid-template-columns: repeat(7, 1fr); }
}
</style>
